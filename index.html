<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>EVERISE V4 · Inventory · Invoice · Tracking</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAFAF9;
  --surface: #FFFFFF;
  --line: #E7E5E4;
  --line-strong: #D6D3D1;
  --line-soft: #F5F5F4;
  --text: #1C1917;
  --text-2: #44403C;
  --text-3: #78716C;
  --text-4: #A8A29E;
  --accent: #1C1917;
  --warn-bg: #FFFBEB;
  --warn-line: #FEF3C7;
  --warn-text: #B45309;
  --danger-bg: #FEF2F2;
  --danger-line: #FECACA;
  --danger-text: #B91C1C;
}
body {
  font-family: 'PingFang TC', 'Microsoft JhengHei', '微軟正黑體', -apple-system, system-ui, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.mono { font-family: 'SF Mono', Menlo, Consolas, monospace; }
.tnr { font-family: 'Times New Roman', serif; }

/* Navbar */
.navbar {
  background: white; border-bottom: 1px solid var(--line);
  padding: 10px 20px; position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.brand { font-weight: 700; font-size: 16px; color: var(--text); letter-spacing: 0.5px; }
.brand-badge { background: var(--text); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.4px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #A8A29E; display: inline-block; margin-left: 6px; }
.sync-dot.live { background: #16A34A; box-shadow: 0 0 0 3px #DCFCE7; }
.sync-dot.err { background: #DC2626; box-shadow: 0 0 0 3px #FEE2E2; }
.nav-tabs { display: flex; gap: 2px; background: var(--line-soft); padding: 3px; border-radius: 8px; }
.nav-tab {
  padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--text-3);
  background: transparent; border: none; border-radius: 5px; cursor: pointer; transition: all 0.15s;
}
.nav-tab.active { background: white; color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.nav-tab:hover:not(.active) { color: var(--text); }
.nav-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.btn-primary { background: var(--text); color: white; }
.btn-primary:hover { background: #292524; }
.btn-secondary { background: white; color: var(--text); border: 1px solid var(--line-strong); }
.btn-secondary:hover { background: var(--bg); }
.btn-ghost { background: transparent; color: var(--text-3); padding: 6px 10px; }
.btn-ghost:hover { color: var(--text); background: var(--line-soft); }
.btn-danger { background: white; color: var(--danger-text); border: 1px solid var(--danger-line); }
.btn-danger:hover { background: var(--danger-bg); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-icon { padding: 6px; border-radius: 6px; }

/* Filter Bar */
.filter-bar {
  background: white; border-bottom: 1px solid var(--line); padding: 8px 20px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 53px; z-index: 40;
}
.filter-label { font-size: 10px; color: var(--text-4); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.filter-bar select, .filter-bar input {
  border: 1px solid var(--line-strong); border-radius: 6px;
  padding: 5px 8px; font-size: 12px; color: var(--text-2); background: white; outline: none;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--text-3); }
.search-input { min-width: 180px; }
.filter-count { margin-left: auto; font-size: 11px; color: var(--text-4); }

/* Main */
main { padding: 24px; max-width: 1440px; margin: 0 auto; }
h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; letter-spacing: -0.01em; }

/* Card */
.card { background: white; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
.card-hdr {
  padding: 12px 16px; border-bottom: 1px solid var(--line-soft);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg); font-size: 13px; font-weight: 600;
}

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: var(--bg); }
thead th {
  padding: 10px 12px; text-align: left; font-size: 10px; text-transform: uppercase;
  color: var(--text-3); font-weight: 600; letter-spacing: 0.04em;
  border-bottom: 1px solid var(--line);
}
tbody tr { border-bottom: 1px solid var(--line-soft); }
tbody tr:hover { background: var(--bg); }
tbody td { padding: 10px 12px; color: var(--text-2); }
.row-click { cursor: pointer; }
.text-right { text-align: right; }
.text-center { text-align: center; }
.empty { padding: 32px; text-align: center; color: var(--text-4); }

/* Stats */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
.stat { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; cursor: default; transition: all 0.15s; }
.stat.clickable { cursor: pointer; }
.stat.clickable:hover { border-color: var(--text-3); transform: translateY(-1px); }
.stat .label { font-size: 10px; text-transform: uppercase; color: var(--text-4); font-weight: 600; letter-spacing: 0.05em; }
.stat .val { font-size: 24px; font-weight: 700; color: var(--text); margin-top: 4px; letter-spacing: -0.02em; }
.stat .sub { font-size: 11px; color: var(--text-4); margin-top: 2px; }
.stat.warning { background: var(--warn-bg); border-color: var(--warn-line); }
.stat.warning .val { color: var(--warn-text); }
.stat.danger { background: var(--danger-bg); border-color: var(--danger-line); }
.stat.danger .val { color: var(--danger-text); }

/* Breadcrumbs */
.crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 16px; flex-wrap: wrap; }
.crumb { color: var(--text-3); cursor: pointer; }
.crumb:hover { color: var(--text); text-decoration: underline; }
.crumb.active { color: var(--text); font-weight: 600; cursor: default; text-decoration: none; }
.crumb-sep { color: var(--line-strong); }

/* SA cards grid */
.sa-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
.sa-card {
  background: white; border: 1px solid var(--line); border-radius: 14px; padding: 16px;
  cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
}
.sa-card:hover { border-color: var(--text-3); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
.sa-card .top-row { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
.sa-card .cno { background: var(--text); color: white; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
.tag { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; display: inline-flex; align-items: center; gap: 4px; border: 1px solid; }
.tag-cn { background: var(--danger-bg); color: var(--danger-text); border-color: var(--danger-line); }
.tag-er { background: var(--line-soft); color: var(--text-3); border-color: var(--line); }
.tag-warn { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-line); }
.sa-card .date { font-size: 18px; font-weight: 700; margin-top: 4px; letter-spacing: -0.01em; }
.sa-card .meta { font-size: 11px; color: var(--text-3); margin-top: 4px; }
.sa-card .total { text-align: right; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line-soft); font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.sa-card .total .thb-tag { font-size: 10px; color: var(--text-4); font-weight: 400; margin-right: 4px; }

/* Client section header */
.client-section { margin-bottom: 36px; }
.client-hdr { display: flex; justify-content: space-between; align-items: end; margin-bottom: 18px; border-bottom: 1px solid var(--line); padding-bottom: 12px; flex-wrap: wrap; gap: 14px; }
.client-badge { background: var(--text); color: white; padding: 6px 16px; border-radius: 8px; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
.cno-panel { display: flex; align-items: center; gap: 14px; background: white; border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; }
.cno-panel .col { display: flex; flex-direction: column; gap: 1px; }
.cno-panel .vlabel { font-size: 9px; color: var(--text-4); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.cno-panel .vno { font-family: 'SF Mono', Menlo, monospace; font-size: 16px; font-weight: 700; }
.cno-panel .vdiv { width: 1px; height: 28px; background: var(--line); }
.cno-panel .btn-set { background: var(--line-soft); border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; color: var(--text-2); transition: all 0.15s; }
.cno-panel .btn-set:hover { background: var(--text); color: white; }
.cno-panel .btn-set .pill { background: var(--warn-line); color: var(--text); padding: 1px 5px; border-radius: 3px; font-family: 'SF Mono', monospace; }
.cno-panel .btn-set:hover .pill { background: var(--warn-bg); color: var(--text); }

/* Two col */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

/* Inventory chips */
.chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--line-soft); border-radius: 6px; font-size: 11px; margin: 2px; border: 1px solid var(--line); }
.chip strong { color: var(--text); }
.chip .qty { color: var(--text-3); font-family: 'SF Mono', monospace; }
.chip .ct { color: var(--text-4); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(28,25,23,0.5); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
.modal { background: white; border-radius: 16px; max-width: 600px; width: 100%; max-height: 88vh; overflow: auto; border: 1px solid var(--line); }
.modal-hdr { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.modal-hdr h3 { font-size: 18px; font-weight: 700; }
.modal-body { padding: 20px; }
.modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }
.modal label { display: block; font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.modal input, .modal select, .modal textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--line-strong); border-radius: 7px; font-size: 13px; outline: none; }
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--text); }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.field { margin-bottom: 12px; }

/* Inline edit on table */
.inline-edit input, .inline-edit select { padding: 4px 6px; font-size: 12px; border: 1px solid var(--line); border-radius: 4px; width: 100%; }
.editing-row { background: var(--warn-bg) !important; }

/* Invoice PDF template */
.invoice-page { width: 210mm; min-height: 297mm; background: white; padding: 10mm; font-family: 'Times New Roman', serif; color: black; margin: 0 auto; box-sizing: border-box; }
.invoice-hdr { text-align: center; border-bottom: 2px double black; padding-bottom: 8px; margin-bottom: 12px; }
.invoice-hdr h1 { font-size: 22px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
.invoice-hdr p { font-size: 11px; font-weight: bold; }
.invoice-hdr .stamp { display: inline-block; border: 2px solid black; padding: 4px 30px; font-size: 22px; font-weight: bold; margin-top: 8px; }
.invoice-meta { display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 12px; gap: 16px; font-size: 14px; }
.invoice-meta .line { border-bottom: 1px solid black; padding-bottom: 2px; margin-bottom: 4px; display: flex; justify-content: space-between; }
.invoice-table { width: 100%; border-top: 2px solid black; margin-bottom: 16px; }
.invoice-table tr { border-bottom: 1px solid black; }
.invoice-table .order-row td { padding: 8px 0 2px; font-weight: bold; font-size: 15px; }
.invoice-table .item-row td { font-size: 13px; padding: 2px 0; vertical-align: top; }
.invoice-total { border-top: 3px double black; padding-top: 10px; display: flex; justify-content: space-between; padding-left: 8px; padding-right: 8px; }
.invoice-total .label { font-size: 18px; font-weight: bold; }
.invoice-total .amount { font-size: 26px; font-weight: bold; }
.invoice-foot { border-top: 2px solid black; margin-top: auto; padding-top: 8px; display: flex; justify-content: space-between; }
.invoice-foot .cash { font-size: 18px; font-weight: bold; text-decoration: underline; letter-spacing: 4px; text-transform: uppercase; }

/* Hidden PDF capture container */
.pdf-capture-host { position: absolute; left: -99999px; top: -99999px; opacity: 0; pointer-events: none; }

/* Print stylesheet */
@media print {
  body * { visibility: hidden; }
  .invoice-page, .invoice-page * { visibility: visible; }
  .invoice-page { position: relative; left: 0; top: 0; margin: 0; box-shadow: none; page-break-after: always; }
  .navbar, .filter-bar, .modal-overlay { display: none !important; }
  @page { size: A4; margin: 0; }
}

/* Mobile */
@media (max-width: 700px) {
  .navbar { padding: 10px 12px; }
  .nav-tabs { overflow-x: auto; }
  main { padding: 16px 12px; }
  .filter-bar { padding: 8px 12px; }
  .sa-grid { grid-template-columns: 1fr; }
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease-out; }
</style>
</head>

function getOut2025(itemName, color) {
  if (!_out2025Index) {
    _out2025Index = {};
    OUT2025_RAW.forEach(([p, c, qty]) => {
      const np = normalizeProductName(p).toUpperCase();
      const nc = normalizeColorName(c, p).toUpperCase();
      _out2025Index[`${np}|${nc}`] = qty;

  }
  const k = `${(itemName || '').toUpperCase()}|${(color || '').toUpperCase()}`;
  return _out2025Index[k] || 0;
}

// 反向 lookup (從 client column 解析 ER / ER(TAG) / 直送客戶)
// 規則：
//   "ER" → 進倉庫一般庫存 (flow='in')
//   "ER(CSK)/ER(PAT)/ER(VP)/ER(DP)/ER(OC)" → 進倉庫但標記給該客戶 (flow='in')
//   其他客戶代碼 → 從中國直送該客戶 (flow='out'，算營業額)
function parseClientCell(rawClient) {
  // 先去空格 + 全形→半形 + 大寫 (用 cleanString 統一處理)
  let s = cleanString(rawClient).toUpperCase();
  if (!s) return { kind: 'unknown', client: 'UNKNOWN', stockTag: null, flow: 'out' };
  // 容許 "ER(CSK)" / "ER (CSK)" / "ER  (CSK)" 等任意數量空格
  const m = s.match(/^ER\s*\(\s*([A-Z]+)\s*\)$/);
  if (m) return { kind: 'warehouse-tagged', client: 'ER', stockTag: m[1], flow: 'in' };
  if (s === 'ER') return { kind: 'warehouse', client: 'ER', stockTag: null, flow: 'in' };
  return { kind: 'direct', client: s, stockTag: null, flow: 'out' };
}

// 判斷一筆 master_data 是否為「出貨」(計入營業額/SA)
function isOutgoingRow(d) {
  if (d.kind) return d.kind === 'direct';
  if (d.flow) return d.flow === 'out';
  return parseClientCell(d.client).kind === 'direct';
}
// 判斷一筆是「進貨」(計入庫存增加)
function isIncomingRow(d) {
  if (d.kind) return d.kind === 'warehouse' || d.kind === 'warehouse-tagged';
  if (d.flow) return d.flow === 'in';
  const k = parseClientCell(d.client).kind;
  return k === 'warehouse' || k === 'warehouse-tagged';
}
// 是否「已審核」— 未顯式標 reviewed=false 者一律當已審核 (向後相容 legacy 資料)
function isReviewed(d) {
  return d.reviewed !== false;
}

// 通用「清洗髒字串」：處理大小寫無關之外的常見格式問題
function cleanString(s) {
  return String(s || '')
    .replace(/[　\xa0]/g, ' ')   // 全形空格 / non-breaking space → 半形空格
    .replace(/[—–]/g, '-')            // em-dash / en-dash → 一般 hyphen
    .replace(/（/g, '(').replace(/）/g, ')') // 全形括號 → 半形
    .replace(/[×✕✖]/g, 'x')           // 乘號 × / ✕ / ✖ → 字母 x (避免品名比對失敗)
    .replace(/[​‌‍﻿]/g, '') // 零寬字元 (常因複製貼上偷帶進來)
    .trim()
    .replace(/\s+/g, ' ');             // 多個空白 → 一個
}

// 把任意品名 normalize 到 MASTER_INVENTORY 標準名
// 優先順序：客戶級 PAIR mapping > 智慧匹配 > 使用者單一品名 mappings > 內建字典 > MASTER 直接比對 > 模糊
function normalizeProductName(raw, colorHint, clientHint) {
  let s = cleanString(raw);
  if (!s) return s;
  // 預處理：把「/VP」「/CSK」「/PAT」「/TST」「/CH」「/SPN」這種斜線後綴改成 (XXX)
  // 因為泰國有時用斜線代表客戶標記，這樣才不會被模糊比對誤判成沒有 tag 的品相
  const slashMatch = s.match(/^(.+?)\s*\/\s*([A-Z]{2,4})\s*$/i);
  if (slashMatch) {
    const candidate = `${slashMatch[1].trim()} (${slashMatch[2].toUpperCase()})`;
    // 先試 candidate 是不是 MASTER 已知品相
    for (const sku of MASTER_INVENTORY) {
      if (sku.itemName.toUpperCase() === candidate.toUpperCase()) {
        s = sku.itemName;
        break;
      }
    }
  }
  const upper = s.toUpperCase();
  // 0a. 客戶級 PAIR mapping (客戶+品名+顏色三者完全一樣才套用，最準確最安全)
  if (colorHint && clientHint) {
    const pairKey = String(clientHint).trim().toUpperCase() + '||' + upper + '||' + String(colorHint).trim().toUpperCase();
    const pair = state.userMappings?.pairs?.[pairKey];
    if (pair) return pair.product;
  }
  // 0b. 使用者單一品名 mapping (向後相容)
  const userMap = state.userMappings?.products || {};
  if (userMap[upper]) return userMap[upper];
  if (userMap[s]) return userMap[s];
  // 1. 內建字典 (顯式 mapping 優先，但若有 colorHint 必須驗證顏色存在於該品相，
  //    否則例：「600x600 PVC + Navy」會被誤認為 "600x600D PVC" (只有 Black))
  for (const k of Object.keys(PRODUCT_NORMALIZE_MAP)) {
    if (k.toUpperCase() === upper) {
      const mapped = PRODUCT_NORMALIZE_MAP[k];
      if (!colorHint) return mapped;
      const colorUpper = String(colorHint).trim().toUpperCase();
      const hasColor = MASTER_INVENTORY.some(s => s.itemName === mapped && s.color.toUpperCase() === colorUpper);
      if (hasColor) return mapped;
      // 字典命中但顏色不存在 → 落到智慧匹配
      break;
    }
  }
  // 2. MASTER_INVENTORY 直接比對 (但若有 colorHint，也要該品相有這個顏色才認)
  const directMatch = MASTER_INVENTORY.find(sku => sku.itemName.toUpperCase() === upper);
  if (directMatch) {
    if (!colorHint) return directMatch.itemName;
    const colorUpper = String(colorHint).trim().toUpperCase();
    const hasColor = MASTER_INVENTORY.some(s => s.itemName === directMatch.itemName && s.color.toUpperCase() === colorUpper);
    if (hasColor) return directMatch.itemName;
    // 名字對但顏色不對 → 不直接認，繼續往下 (給智慧匹配機會找別的品相)
  }
  // 2b. 寬鬆比對：忽略空格、底線、特殊符號（只保留英數字大寫）
  //     例：「420DNYLON0.4MM」「420d nylon 0.4mm」「420D_NYLON_0.4MM」→ 全部對到 "420D Nylon 0.4MM"
  //     這層解決使用者「大小寫/空格」問題自動歸類
  const simplifyForMatch = x => String(x || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  const looseUpper = simplifyForMatch(s);
  if (looseUpper.length >= 4) {
    const looseMatches = MASTER_INVENTORY.filter(sku => simplifyForMatch(sku.itemName) === looseUpper);
    const uniqueNames = [...new Set(looseMatches.map(m => m.itemName))];
    if (uniqueNames.length === 1) {
      if (!colorHint) return uniqueNames[0];
      const colorUpper = String(colorHint).trim().toUpperCase();
      const hasColor = looseMatches.some(sk => sk.color.toUpperCase() === colorUpper);
      if (hasColor) return uniqueNames[0];
      // 顏色對不上 → 繼續落到智慧匹配
    }
  }
  // 3pre. 高信心：raw 簡化型唯一對應到一個 MASTER 品相，且該品相有此顏色 → 直接用
  //       例：raw "Mesh 250G" → findProductCandidates 唯一指向 "Sandwich Mesh 250G (OC)"
  //       且該品相有 Black → 用 "Sandwich Mesh 250G (OC)" (不會走到 fuzzy 抹掉 OC tag)
  if (colorHint) {
    const colorUpper = String(colorHint).trim().toUpperCase();
    const nameCandidates = findProductCandidates(s);
    if (nameCandidates.length === 1) {
      const c = nameCandidates[0];
      if (MASTER_INVENTORY.some(sku => sku.itemName === c && sku.color.toUpperCase() === colorUpper)) {
        return c;
      }
    }
  }
  // 3a. 「600x600 家族」特殊處理：raw 含 "600x600" 或 "600*600" 時，優先用該家族 + 顏色匹配
  //     例："600x600 PVC" + Navy → 600x600D PVC 沒 Navy 但 600*600D 0.6MM (CSK) 有 → CSK
  //     例："600x600 PVC" + Burgundy → 只有 CSK 有 → CSK
  if (colorHint) {
    const colorUpper = String(colorHint).trim().toUpperCase();
    const has600x600 = /600\s*[Xx*]\s*600/i.test(s);
    if (has600x600) {
      const family600 = [...new Set(
        MASTER_INVENTORY.filter(sku => /600\s*[Xx*]\s*600/i.test(sku.itemName) && sku.color.toUpperCase() === colorUpper).map(sku => sku.itemName)
      )];
      if (family600.length === 1) return family600[0];
    }
  }
  // 3b. 智慧匹配：候選 = (品名相似的) ∪ (有此顏色的 MASTER 品相)
  //    例：rawProduct="600D PVC" + Burgundy → Burgundy 只有 CSK 有 → 用 CSK
  //    例：rawProduct="600D*600D" + Red → 只有 CSK 有 Red → 回傳 CSK
  //    例：rawProduct="C4" + Black → 多個品相都有 Black → 不亂分 (待澄清)
  if (colorHint) {
    const colorUpper = String(colorHint).trim().toUpperCase();
    const nameCandidates = findProductCandidates(s);
    // 把「有此顏色的所有品相」也加進候選池
    const colorBasedCandidates = [...new Set(
      MASTER_INVENTORY.filter(sku => sku.color.toUpperCase() === colorUpper).map(sku => sku.itemName)
    )];
    const allCandidates = [...new Set([...nameCandidates, ...colorBasedCandidates])];
    if (allCandidates.length >= 1) {
      const matchedByColor = allCandidates.filter(p =>
        MASTER_INVENTORY.some(sku => sku.itemName === p && sku.color.toUpperCase() === colorUpper)
      );
      if (matchedByColor.length === 1) return matchedByColor[0]; // 顏色獨家匹配 → 安全分類
    }
  }
  // 3c. 模糊比對 (內建字典) — 若有 colorHint 也要驗證顏色，否則容易把「600x600 + Navy」誤分到只有 Black 的 600x600D PVC
  for (const k of Object.keys(PRODUCT_NORMALIZE_MAP)) {
    if (upper.includes(k.toUpperCase()) || k.toUpperCase().includes(upper)) {
      const mapped = PRODUCT_NORMALIZE_MAP[k];
      if (!colorHint) return mapped;
      const colorUpper = String(colorHint).trim().toUpperCase();
      const hasColor = MASTER_INVENTORY.some(sku => sku.itemName === mapped && sku.color.toUpperCase() === colorUpper);
      if (hasColor) return mapped;
      // 沒這個顏色就跳過，繼續找
    }
  }
  // 4. 找不到就回傳原值
  return s;
}

// 高信心 normalize — 只走「PAIR mapping / 字典精確 / MASTER 直接 / 寬鬆英數比對」四層
// 不走 smart match (容易猜錯，例如 C4 + Black 不會被誤導去 385)
// 用途：待澄清頁面預設 dropdown 選擇 (高信心才預選，否則保留原名給使用者自選)
function normalizeProductNameHighConfidence(raw, colorHint, clientHint) {
  let s = cleanString(raw);
  if (!s) return null;
  const upper = s.toUpperCase();
  const colorUpper = colorHint ? String(colorHint).trim().toUpperCase() : '';
  // 0. PAIR mapping (使用者過去審過完全一樣的 客戶+品名+顏色 → 直接套用，最高信心)
  if (colorHint && clientHint) {
    const pairKey = String(clientHint).trim().toUpperCase() + '||' + upper + '||' + colorUpper;
    const pair = state.userMappings?.pairs?.[pairKey];
    if (pair && pair.product) return pair.product;
  }
  // 1. 字典精確 (且 color 在 MASTER 內有對應)
  for (const k of Object.keys(PRODUCT_NORMALIZE_MAP)) {
    if (k.toUpperCase() === upper) {
      const mapped = PRODUCT_NORMALIZE_MAP[k];
      if (!colorHint) return mapped;
      if (MASTER_INVENTORY.some(s => s.itemName === mapped && s.color.toUpperCase() === colorUpper)) return mapped;
      return null;
    }
  }
  // 2. MASTER 直接
  const direct = MASTER_INVENTORY.find(sku => sku.itemName.toUpperCase() === upper);
  if (direct) {
    if (!colorHint) return direct.itemName;
    if (MASTER_INVENTORY.some(s => s.itemName === direct.itemName && s.color.toUpperCase() === colorUpper)) return direct.itemName;
    return null;
  }
  // 3. 寬鬆 (英數字大寫比對) — 只接受唯一匹配
  const simplifyForMatch = x => String(x || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  const loose = simplifyForMatch(s);
  if (loose.length >= 4) {
    const matches = MASTER_INVENTORY.filter(sku => simplifyForMatch(sku.itemName) === loose);
    const uniq = [...new Set(matches.map(m => m.itemName))];
    if (uniq.length === 1) {
      if (!colorHint) return uniq[0];
      if (matches.some(sk => sk.color.toUpperCase() === colorUpper)) return uniq[0];
    }
  }
  return null;
}

// 找出 raw 可能對應到 MASTER_INVENTORY 內哪些品相
// 規則：把品名簡化成「字母+數字」的核心，比對是否互相包含
const _candidateCache = new Map();
function findProductCandidates(raw) {
  const key = (raw || '').trim().toUpperCase();
  if (_candidateCache.has(key)) return _candidateCache.get(key);
  const simplify = s => String(s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  const rawSimple = simplify(raw);
  if (!rawSimple) { _candidateCache.set(key, []); return []; }
  const allProducts = [...new Set(MASTER_INVENTORY.map(s => s.itemName))];
  const candidates = allProducts.filter(p => {
    const pSimple = simplify(p);
    // 互相是子字串，且核心數字片段（如 600600D / 1680D / 320G）有重疊
    return (pSimple.includes(rawSimple) || rawSimple.includes(pSimple)) && rawSimple.length >= 3;
  });
  _candidateCache.set(key, candidates);
  return candidates;
}

function normalizeColorName(raw, productHint, clientHint) {
  const s = cleanString(raw);
  if (!s) return s;
  const upper = s.toUpperCase();
  // 0a. 客戶級 PAIR mapping (客戶+品名+顏色三者完全一樣才套用)
  if (productHint && clientHint) {
    const pairKey = String(clientHint).trim().toUpperCase() + '||' + String(productHint).trim().toUpperCase() + '||' + upper;
    const pair = state.userMappings?.pairs?.[pairKey];
    if (pair) return pair.color;
  }
  // 0b. 使用者單一顏色 mapping (向後相容)
  const userMap = state.userMappings?.colors || {};
  if (userMap[upper]) return userMap[upper];
  if (userMap[s]) return userMap[s];
  // 1. 內建字典
  for (const k of Object.keys(COLOR_NORMALIZE_MAP)) {
    if (k.toUpperCase() === upper) return COLOR_NORMALIZE_MAP[k];
  }
  // 2. Context-aware: 純編號如 "#12" "#1" "#71078" → 找該品名下尾綴相同的顏色
  // 例如 product="OO" + color="#12" → 找到 "Grey#12" (因為 OO 只有 Grey#12 帶 #12)
  if (productHint && /^#\d+/.test(s)) {
    const normP = normalizeProductName(productHint).toUpperCase();
    const candidates = MASTER_INVENTORY.filter(sku =>
      sku.itemName.toUpperCase() === normP && sku.color.endsWith(s)
    );
    if (candidates.length === 1) return candidates[0].color;
    // 若有多個候選 (例 "Cream #4" 和 "Coffee #4" 都尾綴 #4)，回傳原值，由模糊清單顯示
  }
  return s;
}

// 判斷 normalize 後是否真的對得上 MASTER_INVENTORY 或使用者已處理過
// colorHint 用來幫品名解歧義（如 600D*600D + Red → CSK）
function isProductRecognized(rawProduct, colorHint) {
  const upper = cleanString(rawProduct).toUpperCase();
  if (!upper) return true;
  if (state.userMappings?.products?.[upper]) return true;
  if (state.userMappings?.products?.[rawProduct]) return true;
  const norm = normalizeProductName(rawProduct, colorHint).toUpperCase();
  return MASTER_INVENTORY.some(s => cleanString(s.itemName).toUpperCase() === norm);
}
function isColorRecognized(rawProduct, rawColor) {
  const upper = cleanString(rawColor).toUpperCase();
  if (!upper) return true;
  if (state.userMappings?.colors?.[upper]) return true;
  if (state.userMappings?.colors?.[rawColor]) return true;
  const normP = normalizeProductName(rawProduct, rawColor).toUpperCase();
  const normC = normalizeColorName(rawColor, rawProduct).toUpperCase();
  return MASTER_INVENTORY.some(s => cleanString(s.itemName).toUpperCase() === normP && cleanString(s.color).toUpperCase() === normC);
}

// 髒數據清洗大腦 — 50*23R+30Y=1180Y → 1180
function sanitizeQuantity(raw) {
  if (raw == null) return 0;
  const s = String(raw).trim().toUpperCase();
  if (!s) return 0;
  // 取最後一個 = 號後面的數字
  if (s.includes('=')) {
    const m = s.match(/=\s*([-]?[\d.]+)\s*Y?\s*$/);
    if (m) return parseFloat(m[1]);
  }
  // 包含 * 但沒有 = → 試著 eval 安全表達式
  if (s.includes('*') || s.includes('+')) {
    try {
      const safe = s.replace(/Y/g, '').replace(/[A-Z]/g, '');
      if (/^[\d+\-*/().\s]+$/.test(safe)) {
        // eslint-disable-next-line no-new-func
        const v = Function('return ' + safe)();
        if (typeof v === 'number' && isFinite(v)) return v;
      }
    } catch(e) {}
  }
  const num = parseFloat(s.replace(/[^\d.\-]/g, ''));
  return isNaN(num) ? 0 : num;
}

// 智能數量解析 (給請款單顯示用) — 145 → 50*2R+45=145Y
function parseQuantityForInvoice(qty, productName) {
  const q = Number(qty) || 0;
  if (!q) return '0Y';
  let yPerRoll = 50;
  const p = String(productName || '').toUpperCase();
  if (/210D? PU/.test(p) && /PU\*?2|210 PU|210D PU/.test(p)) yPerRoll = 50;
  if (p.includes('210 PU') || p.includes('210D PU')) yPerRoll = 150;
  if (/CRACK FACE|KEVLAR|LACOSTE|VACCUM|VACUUM|CHECKER|385|305/.test(p)) yPerRoll = 40;
  const rolls = Math.floor(q / yPerRoll);
  const remainder = q - rolls * yPerRoll;
  if (rolls > 0 && remainder > 0) return `${yPerRoll}*${rolls}R+${remainder}=${q}Y`;
  if (rolls > 0) return `${yPerRoll}*${rolls}R=${q}Y`;
  return `${q}Y`;
}

// ER 倉庫進貨櫃號：
// 1. CSV 有 cabinetNo → 直接用
// 2. 否則查 manualCabins (1-5 月歷史容器手動對應)
// 3. 否則依日期從 startDate 起自動編 ER#634, ER#635, ...
let _erCabinMap = null;
function buildERCabinMap() {
  const conf = state.clientConfig?.ER || DEFAULT_CLIENT_CONFIG.ER;
  const startNo = conf.startNo || DEFAULT_CLIENT_CONFIG.ER.startNo || 634;
  const startDate = conf.startDate || DEFAULT_CLIENT_CONFIG.ER.startDate || '2026-06-01';
  const startSortable = dateToSortable(startDate);
  // 把 manualCabins 的 key 統一轉成 sortable，避免日期格式不同 (2026/1/24 vs 2026-01-24) 對不上
  // 永遠優先用 DEFAULT_CLIENT_CONFIG.ER.manualCabins (寫死的最權威源)，
  // 即使 Firestore 同步的舊 config 沒這個欄位也不會被覆蓋
  const mergedManualCabins = {
    ...(DEFAULT_CLIENT_CONFIG.ER.manualCabins || {}),
    ...(conf.manualCabins || {})
  };
  const manualBySortable = {};
  Object.entries(mergedManualCabins).forEach(([d, cabin]) => {
    manualBySortable[dateToSortable(d)] = cabin;
  });
  // 排序好的 manualCabin sortable 日期 — 用於「最近期 fallback」(找日期 ≤ row.date 的最後一個容器)
  const manualSortedKeys = Object.keys(manualBySortable).map(k => parseInt(k)).sort((a,b) => a - b);
  // 為「沒有 manualCabin」且日期 >= startDate 的列自動編號
  const erRows = state.masterData.filter(d => {
    const k = d.kind || parseClientCell(d.client).kind;
    if (!(k === 'warehouse' || k === 'warehouse-tagged')) return false;
    if (!d.date) return false;
    return dateToSortable(d.date) >= startSortable;
  });
  const uniqueDates = [...new Set(erRows.map(d => d.date))].sort((a,b) => dateToSortable(a) - dateToSortable(b));
  const autoMap = {};
  uniqueDates.forEach((date, idx) => {
    autoMap[date] = `${conf.prefix}#${String(startNo + idx).padStart(3, '0')}`;
  });
  return { manualBySortable, manualSortedKeys, autoMap, startSortable };
}
function getERCabinFor(row) {
  if (!_erCabinMap) _erCabinMap = buildERCabinMap();
  const sortable = dateToSortable(row.date);
  // 1. 手動精確日期對應 (寫死的最權威) — 即使舊資料 d.cabinetNo 被亂寫過也優先用這個
  if (_erCabinMap.manualBySortable[sortable]) return _erCabinMap.manualBySortable[sortable];
  // 2. CSV / 使用者手動寫的 cabinetNo (但過濾無意義值)
  const cabin = (row.cabinetNo || '').trim();
  const isMeaningless = !cabin || cabin === 'N/A' || cabin === '-' || cabin === '—' || cabin === 'n/a';
  if (!isMeaningless) return cabin;
  // 3. 6 月之後自動編號
  if (_erCabinMap.autoMap[row.date]) return _erCabinMap.autoMap[row.date];
  // 4. 找「日期 ≤ row.date 的最後一個 manualCabin」— 同一個容器在下一個到達前都算
  //    (例如 2026/2/9 的記錄會用 2026/2/8 的 ER#660；4/11 用 4/2 的 ER#662)
  if (sortable > 0 && _erCabinMap.manualSortedKeys.length) {
    let last = null;
    for (const k of _erCabinMap.manualSortedKeys) {
      if (k <= sortable) last = k; else break;
    }
    if (last !== null) return _erCabinMap.manualBySortable[last];
  }
  return '';
}
// 每次 masterData 改變時，清空 cache (在 onSnapshot 中已 render，會重建)

// 把日期字串轉成可正確排序的格式 (2026/1/4 → 2026-01-04 → 20260104)
function dateToSortable(d) {
  if (!d) return 0;
  const s = String(d).trim();
  const parts = s.split(/[/\-.]/).map(p => p.trim());
  if (parts.length < 3) return Number(s.replace(/\D/g, '')) || 0;
  const [y, m, day] = parts;
  const yy = parseInt(y) || 0;
  const mm = parseInt(m) || 0;
  const dd = parseInt(day) || 0;
  return yy * 10000 + mm * 100 + dd; // e.g. 20260104
}
// 通用排序函數 — 套在所有流水資料
function sortFlow(arr, mode) {
  const m = mode || state.sortMode || 'date_desc';
  const a = [...arr];
  switch (m) {
    case 'date_asc':    return a.sort((x,y) => dateToSortable(x.date) - dateToSortable(y.date));
    case 'date_desc':   return a.sort((x,y) => dateToSortable(y.date) - dateToSortable(x.date));
    case 'qty_desc':    return a.sort((x,y) => (y.shippedQty||0) - (x.shippedQty||0));
    case 'qty_asc':     return a.sort((x,y) => (x.shippedQty||0) - (y.shippedQty||0));
    case 'client_asc':  return a.sort((x,y) => (x.client||'').localeCompare(y.client||''));
    case 'product_asc': return a.sort((x,y) => (x.product||'').localeCompare(y.product||''));
    case 'review_asc':  return a.sort((x,y) => (isReviewed(x)?1:0) - (isReviewed(y)?1:0)); // 未審在前
    case 'review_desc': return a.sort((x,y) => (isReviewed(y)?1:0) - (isReviewed(x)?1:0)); // 已審在前
    default: return a;
  }
}

function filteredMaster() {
  let d = state.masterData;
  const f = state.filter;
  if (f.client !== 'ALL') d = d.filter(x => x.client === f.client);
  if (f.month !== 'ALL') d = d.filter(x => (x.date || '').startsWith(f.month));
  if (f.origin !== 'ALL') d = d.filter(x => (x.origin || 'ER') === f.origin);
  if (f.reviewStatus === 'reviewed') d = d.filter(x => isReviewed(x));
  else if (f.reviewStatus === 'unreviewed') d = d.filter(x => !isReviewed(x));
  if (f.search) {
    const q = f.search.toLowerCase();
    d = d.filter(x =>
      (x.product||'').toLowerCase().includes(q) ||
      (x.rawProduct||'').toLowerCase().includes(q) ||
      (x.color||'').toLowerCase().includes(q) ||
      (x.rawColor||'').toLowerCase().includes(q) ||
      (x.orderNo||'').toLowerCase().includes(q) ||
      (x.cabinetNo||'').toLowerCase().includes(q) ||
      (x.client||'').toLowerCase().includes(q) ||
      (x.note||'').toLowerCase().includes(q) ||
      (x.source||'').toLowerCase().includes(q)
    );
  }
  return sortFlow(d);
}

// 同日期+同產地一張 SA 單 — 只算「出貨」(kind=direct) 且「已審核」
// 未審核的列不會出現在請款單裡，等使用者在待澄清頁按 ✓ 後才浮現
function _groupSAInvoicesImpl() {
  const res = {};
  // 出貨列才會出請款單。手動校正列 (source=__manual__ 或 isCorrection=true) 雖然會扣庫存
  // 但不該出現在請款單 — 那是內部對帳/盤點用，不是真實出貨給客戶
  const outgoingData = state.masterData.filter(d =>
    isOutgoingRow(d) &&
    isReviewed(d) &&
    d.source !== '__manual__' &&
    !d.isCorrection
  );
  const sortedClients = [...new Set(outgoingData.map(d => d.client).filter(Boolean))].sort();
  sortedClients.forEach(c => {
    const rows = outgoingData.filter(d => d.client === c && (d.shippedQty || 0) > 0);
    const keys = [...new Set(rows.map(r => `${r.date}|${r.origin || 'ER'}`))]
      .sort((a,b) => {
        const da = new Date(a.split('|')[0] || 0);
        const dbd = new Date(b.split('|')[0] || 0);
        if (da < dbd) return -1; if (da > dbd) return 1;
        return a.localeCompare(b);
      });
    res[c] = keys.map((key, idx) => {
      const [date, origin] = key.split('|');
      const items = rows.filter(r => r.date === date && (r.origin || 'ER') === origin);
      const conf = state.clientConfig[c] || { startNo: 1, prefix: c };
      const padded = String(conf.startNo + idx).padStart(3, '0');
      const total = items.reduce((s, i) => s + thbRound(i.shippedQty, i.price), 0);
      return {
        id: `${c}-${date}-${origin}`,
        date, origin, client: c, items, total,
        cabinetNo: items[0]?.cabinetNo || `${conf.prefix}#${padded}`
      };
    });
  });
  return res;
}

function displayedInvoices() {
  const all = groupSAInvoices();

    if (arr.length) res[c] = arr;
  });
  return res;
}

// ============================================================================
// === Tab 3: Inventory (庫存管理 drilldown) ==================================
// ============================================================================
function renderInventory() {
  if (state.inv.color) return renderInvL3(state.inv.product, state.inv.color);
  if (state.inv.product) return renderInvL2(state.inv.product);
  return renderInvL1();
}

// 從品名尾綴推斷 tag — "(CSK)" → "CSK"、"(VP)" → "VP"…等。沒有尾綴 → null (歸 ER scope)
function inferTagFromProduct(product) {
  if (!product) return null;
  const m = String(product).trim().match(/\(([A-Za-z]+)\)\s*$/);
  if (m) return m[1].toUpperCase();
  return null;
}

// === 渲染加速：memoize 大型計算 ===
// state.masterData 每次有變動就 bump 這個 version；下面的記憶化函數比對 version 決定要不要重算
let _masterDataVersion = 0;
function bumpMasterDataVersion() { _masterDataVersion++; }
// memoize wrapper：給沒參數的純函數用 (依 state.masterData 結果)
function memoizeByMasterVersion(fn) {
  let lastVersion = -1;
  let lastResult = null;
  return function () {
    if (_masterDataVersion === lastVersion) return lastResult;
    lastVersion = _masterDataVersion;
    lastResult = fn.apply(this, arguments);
    return lastResult;
  };
}

// 動態擴充版的 MASTER_INVENTORY — 含使用者透過待澄清確認過的新 SKU
// 凡是 master_data 內已審核但 (product, color) 不在 MASTER 內的，都算「使用者新增」
function _getEffectiveInventoryImpl() {
  const base = MASTER_INVENTORY.map(s => ({ ...s }));
  const keys = new Set(base.map(s => `${(s.itemName||'').toUpperCase()}|${(s.color||'').toUpperCase()}`));
  state.masterData.forEach(d => {
    if (!d.product || !d.color) return;
    if (!isReviewed(d)) return;
    // 只看「會影響庫存」的列 (ER 進貨 / ER 出貨)；直送的不算新 SKU
    const k = d.kind || parseClientCell(d.client).kind;
    if (k === 'direct') return;
    const key = `${d.product.toUpperCase()}|${d.color.toUpperCase()}`;
    if (!keys.has(key)) {
      // 從品名尾綴推 tag — 例：「600*600D 0.6MM (CSK)」→ tag="CSK"，不會誤歸 ER scope
      // 如果這列有 stockTag (例 ER(VP) 的 VP)，也優先用 stockTag
      const tag = d.stockTag || inferTagFromProduct(d.product);
      base.push({
        itemName: d.product,
        color: d.color,
        out2025: 0,
        init2026: 0,
        out2026: 0,
        current2026: 0,
        tag: tag,
        userAdded: true
      });
      keys.add(key);
    }
  });
  return base;
}
const getEffectiveInventory = memoizeByMasterVersion(_getEffectiveInventoryImpl);

// 取得篩選後庫存（依 scope: ALL / ER / 客戶 tag）
function inventoryScopeFiltered() {
  const scope = state.inv.scope;
  const eff = getEffectiveInventory();
  if (scope === 'ALL') return eff;
  if (scope === 'ER') return eff.filter(s => !s.tag);
  return eff.filter(s => s.tag === scope);
}

// 取得某品相某顏色的所有流水 (出貨 + 進貨皆含)
// 只計入已審核的列 — 未審核的不算庫存/不算營業額
function getShipmentsFor(itemName, color) {
  const targetItem = String(itemName || '').trim().toUpperCase();
  const targetColor = String(color || '').trim().toUpperCase();
  return state.masterData.filter(d => {
    if (!isReviewed(d)) return false;
    if ((d.shippedQty || 0) <= 0) return false;
    // 1. 優先直接比對 (大小寫無關)。對「使用者新增帶 (TAG) 的 SKU」這層最關鍵 —
    //    避免 normalize 把 "Sandwich Mesh 250G (OC)" fuzzy 比對成 "SANDWICH MESH 250G" 而不匹配。
    const dProdUpper = String(d.product || '').trim().toUpperCase();
    const dColorUpper = String(d.color || '').trim().toUpperCase();
    if (dProdUpper === targetItem && dColorUpper === targetColor) return true;
    // 2. 退而求其次：用 normalize 處理大小寫/空格變體
    const normP = normalizeProductName(d.product || '').toUpperCase();
    const normC = normalizeColorName(d.color || '', d.product || '').toUpperCase();
    return normP === targetItem && normC === targetColor;
  });
}
// 只取「從 ER 倉庫實際出貨給客戶」的流水 — 才會扣 ER 庫存
// China 直送 (origin=China, kind=direct) 雖然是出貨，但沒經過 ER 倉庫，不該扣 ER 庫存
// 只有 origin=ER 的 direct 列才算 (例：未來如果有 thailand-side 的出貨 CSV)
function getOutgoingFor(itemName, color) {
  return getShipmentsFor(itemName, color).filter(d => {
    if (!isOutgoingRow(d)) return false;
    if (d.origin === 'China') return false; // 中國直送不扣 ER 庫存
    return true;
  });
}
// 只取進貨流水
function getIncomingFor(itemName, color) {
  return getShipmentsFor(itemName, color).filter(d => isIncomingRow(d));
}

function getCurrentStock(sku) {
  const filtered = inventoryScopeFiltered();
  const exists = filtered.find(s => s.itemName === sku.itemName && s.color === sku.color);
  if (!exists) return null;
  const ships = getShipmentsFor(sku.itemName, sku.color);
  const init = sku.init2026 || 0;
  const totalOutFromFlow = ships.reduce((s, sh) => s + (Number(sh.shippedQty) || 0), 0);
  // current = init2026 - 已知 out2026 + 0 進貨 - 流水額外出貨
  // 為了避免重複扣減 (因為 out2026 也是雲端紀錄)，採用「以雲端流水為主」的計算：
  return init - totalOutFromFlow;
}

function renderInvL1() {
  const filtered = inventoryScopeFiltered();
  // 依 itemName 分組
  // 剩餘 = current2026 (CSV 權威)，計算剩餘 = init + 流水 in - 流水 out (用來找扣錯帳的差異)
  const byProduct = {};
  filtered.forEach(sku => {
    if (!byProduct[sku.itemName]) byProduct[sku.itemName] = { itemName: sku.itemName, colors: [], totalInit: 0, totalIn: 0, totalOut: 0, totalRem: 0, totalComputed: 0, tag: sku.tag };
    const g = byProduct[sku.itemName];
    g.colors.push(sku);
    g.totalInit += sku.init2026 || 0;
    const inQty = getIncomingFor(sku.itemName, sku.color).reduce((s, sh) => s + (sh.shippedQty || 0), 0);
    const outQty = getOutgoingFor(sku.itemName, sku.color).reduce((s, sh) => s + (sh.shippedQty || 0), 0);
    g.totalIn += inQty;
    g.totalOut += outQty;
    g.totalRem += ((sku.init2026 || 0) + inQty - outQty);    // 目前剩餘 = 期初 + 進 - 出 (LIVE)
    g.totalComputed += (sku.current2026 || 0);                // CSV 原始記錄 (對照)
  });
  const allProducts = Object.keys(byProduct).sort();
  let lowCount = 0, zeroCount = 0, negCount = 0, discrepancyCount = 0;
  allProducts.forEach(p => {
    const b = byProduct[p];
    if (b.totalRem < 0) negCount++;
    else if (b.totalRem === 0) zeroCount++;
    else if (b.totalRem < 1000) lowCount++;
    if (Math.abs(b.totalRem - b.totalComputed) > 0) discrepancyCount++;
  });
  // 套用上方卡片篩選
  const f = state.inv.stockFilter;
  const products = allProducts.filter(p => {
    const b = byProduct[p];
    if (f === 'low') return b.totalRem > 0 && b.totalRem < 1000;
    if (f === 'zero') return b.totalRem === 0;
    if (f === 'neg') return b.totalRem < 0;
    if (f === 'discrepancy') return Math.abs(b.totalRem - b.totalComputed) > 0;
    return true;
  });

  const rows = products.map(p => {
    const b = byProduct[p];
    // 判斷是否為使用者新增的 SKU (不在原始 MASTER 內)
    const isUserAdded = b.colors.every(c => c.userAdded);
    return `<tr class="row-click" data-action="drill" data-product="${escAttr(p)}">
      <td>${b.tag ? `<span class="tag tag-warn" style="margin-right:6px;">${b.tag}</span>` : ''}${isUserAdded ? '<span class="tag tag-warn" style="margin-right:6px; background:#FEF3C7; color:#92400E; border-color:#FDE68A;">🆕 新增</span>' : ''}<strong>${escHtml(p)}</strong></td>
      <td class="text-center mono" style="color:var(--text-3);">${b.colors.length}</td>
      <td class="text-right mono" style="color:var(--text-3);">${fmtInt(b.totalInit)}</td>
      <td class="text-right mono" style="color:var(--text-3);">${fmtInt(b.totalIn)}</td>
      <td class="text-right mono" style="color:var(--text-3);">${fmtInt(b.totalOut)}</td>
      <td class="text-right mono" style="font-weight:700; ${b.totalRem < 0 ? 'color:var(--danger-text);' : ''}">${fmtInt(b.totalRem)}</td>
      <td class="text-center" style="color:var(--line-strong);">›</td>
    </tr>`;
  }).join('');

  return `<h2>庫存管理 Inventory</h2>
    ${renderScopeTabs()}
    <div class="stat-grid">
      <div class="stat clickable" data-action="set-stock-filter" data-filter="all"><div class="label">品項總數</div><div class="val">${allProducts.length}</div><div class="sub">點擊清除篩選</div></div>
      <div class="stat"><div class="label">總庫存 (Y)</div><div class="val mono">${fmtInt(Object.values(byProduct).reduce((s,b) => s + b.totalRem, 0))}</div><div class="sub">目前剩餘 (期初+進-出)</div></div>
      <div class="stat clickable warning" data-action="set-stock-filter" data-filter="low" style="${f === 'low' ? 'outline: 2px solid var(--warn-text);' : ''}"><div class="label">低庫存 (<1000Y)</div><div class="val mono">${lowCount}</div><div class="sub">點擊只看</div></div>
      <div class="stat clickable" data-action="set-stock-filter" data-filter="zero" style="${f === 'zero' ? 'outline: 2px solid var(--text);' : ''}"><div class="label">零庫存</div><div class="val mono">${zeroCount}</div><div class="sub">點擊只看</div></div>
      <div class="stat clickable ${negCount > 0 ? 'danger' : ''}" data-action="set-stock-filter" data-filter="neg" style="${f === 'neg' ? 'outline: 2px solid var(--danger-text);' : ''}"><div class="label">負庫存</div><div class="val mono">${negCount}</div><div class="sub">點擊只看</div></div>
    </div>
    <div class="card">
      <div class="card-hdr"><span>全部品相 (${products.length})</span><span style="font-size:11px; color:var(--text-4);">點擊任一行進入顏色明細</span></div>
      <table><thead><tr>
        <th>品相</th><th class="text-center">顏色數</th>
        <th class="text-right">期初</th><th class="text-right">進貨流水</th><th class="text-right">出貨流水</th>
        <th class="text-right">目前剩餘</th><th></th>
      </tr></thead><tbody>${rows || '<tr><td colspan="7" class="empty">無資料</td></tr>'}</tbody></table>
    </div>`;
}

function renderScopeTabs() {
  // 動態：用 getEffectiveInventory 算 tag 數量 (含使用者新增的 SKU，如 OC、DP)
  const eff = getEffectiveInventory();
  const total = eff.length;
  const erCount = eff.filter(s => !s.tag).length;
  const tagCount = (t) => eff.filter(s => s.tag === t).length;
  // 把所有出現過的 tag 收集起來 — 系統 tag (CSK/AP/VP/CH/TST/PAT/SPN) + 使用者自加的 (OC/DP 等)
  const allTags = [...new Set(eff.map(s => s.tag).filter(Boolean))].sort();
  const scopes = [
    { id: 'ALL', label: `全部 (${total})` },
    { id: 'ER',  label: `ER 倉庫 (${erCount})` },
    ...allTags.map(t => ({ id: t, label: `${t} (${tagCount(t)})` }))
  ];
  return `<div class="crumbs" style="margin-bottom: 14px;">
    ${scopes.map(s => `<span class="crumb ${state.inv.scope === s.id ? 'active' : ''}" data-action="set-scope" data-scope="${s.id}">${s.label}</span>`).join('<span class="crumb-sep">·</span>')}
  </div>`;
}

function renderInvL2(prod) {
  const scope = inventoryScopeFiltered();
  const skus = scope.filter(s => s.itemName === prod);

    const init = sku.init2026 || 0;

    const outQty = getOutgoingFor(sku.itemName, sku.color).reduce((s,sh) => s + (sh.shippedQty || 0), 0);

      <td class="text-right mono" style="color:var(--text-3);">${fmtInt(init)}</td>
      <td class="text-right mono" style="color:var(--text-3);">${fmtInt(inQty)}</td>
      <td class="text-right mono" style="color:var(--text-3);">${fmtInt(outQty)}</td>
      <td class="text-right mono" style="font-weight:700; ${live < 0 ? 'color:var(--danger-text);' : ''}">${fmtInt(live)}</td>
      <td class="text-center" style="color:var(--line-strong);">›</td>

  }).join('');

  return `<h2>庫存管理</h2>

      <span class="crumb" data-action="drill" data-product="">全部品相</span>

          <div style="font-size:10px; color:var(--text-4); text-transform:uppercase;">品相</div>
          <div style="font-size:18px; font-weight:700;">${escHtml(prod)}</div>
        </div>
        <span style="font-size:12px; color:var(--text-3);">${skus.length} 個顏色</span>
      </div>
      <table><thead><tr>
        <th>顏色</th>
        <th class="text-right">期初</th><th class="text-right">進貨流水</th><th class="text-right">出貨流水</th>
        <th class="text-right">目前剩餘</th><th></th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

function renderInvL3(prod, color) {
  const sku = getEffectiveInventory().find(s => s.itemName === prod && s.color === color);
  if (!sku) { state.inv.color = null; return renderInvL2(prod); }

  const incoming = getIncomingFor(prod, color);
  const outgoing = getOutgoingFor(prod, color);
  const init = sku.init2026 || 0;
  const csvRem = sku.current2026 || 0; // CSV 權威剩餘
  const inQty = incoming.reduce((s,sh) => s + (sh.shippedQty || 0), 0);
  const outQty = outgoing.reduce((s,sh) => s + (sh.shippedQty || 0), 0);
  const computed = init + inQty - outQty; // 目前剩餘 (LIVE 計算)
  const diff = computed - csvRem;          // 正 = 計算比 CSV 多 (CSV 沒登記到的進貨)
                                            // 負 = 計算比 CSV 少 (CSV 沒登記到的出貨)
  const rem = computed;                     // 主要剩餘用 LIVE 值

  // 客戶分佈 (只看出貨)
  const cb = {};
  outgoing.forEach(s => {
    if (!cb[s.client]) cb[s.client] = { qty: 0, count: 0, thb: 0 };
    cb[s.client].qty += (s.shippedQty || 0);
    cb[s.client].count++;
    cb[s.client].thb += thbRound(s.shippedQty, s.price);
  });
  const chips = Object.entries(cb).sort((a,b) => b[1].qty - a[1].qty).map(([c,d]) =>
    `<span class="chip"><strong>${escHtml(c)}</strong><span class="qty">${fmtInt(d.qty)}Y</span><span class="ct">· ${d.count}次</span><span class="ct">฿${fmtInt(d.thb)}</span></span>`
  ).join('');

  // 進貨：期初 + 所有 ER 進貨流水
  let purHtml = init > 0 ? `<tr style="background:var(--bg);">
    <td class="mono" style="font-size:11px; color:var(--text-3);">2025-12-31</td>
    <td><span class="tag tag-er" style="margin-right:4px;">期初</span>2025 結轉</td>
    <td class="text-right mono" style="font-weight:600;">+${fmtInt(init)}</td>
    <td></td>
  </tr>` : '';
  const incomingSorted = sortFlow(incoming);
  purHtml += incomingSorted.map(s => {
    if (state.editingId === s.id) {
      const v = state.editValues || {};
      return `<tr class="editing-row inline-edit">
        <td><input data-field="date" value="${escAttr(v.date ?? s.date ?? '')}" style="font-size:11px;"></td>
        <td style="display:flex; gap:4px;">
          ${inlineEditProductSelect(v.product ?? s.product ?? '')}
          ${inlineEditColorSelect(v.color ?? s.color ?? '', v.product ?? s.product ?? '')}
        </td>
        <td><input data-field="shippedDisplay" value="${escAttr(v.shippedDisplay ?? s.shippedDisplay ?? s.shippedQty ?? '')}" style="text-align:right; font-size:11px;" class="mono"></td>
        <td style="white-space:nowrap;">
          <button class="btn-ghost btn-icon" data-action="save-edit" data-id="${escAttr(s.id)}" title="儲存">✓</button>
          <button class="btn-ghost btn-icon" data-action="cancel-edit" title="取消">✕</button>
        </td>
      </tr>`;
    }
    // 顯示櫃號：getERCabinFor (含 manualCabins + auto + 最近期 fallback) → orderNo (過濾 N/A 等無意義值) → '—'
    const _ord = String(s.orderNo || '').trim();
    const _ordValid = _ord && !['N/A','n/a','-','—'].includes(_ord);
    const erCabin = getERCabinFor(s) || (_ordValid ? _ord : '') || '—';

function renderRevenue() {
  // 統計：依月份
  const stats = {};
  const process = (date, client, amount, source) => {
    const d = new Date(date);
    if (isNaN(d.getTime())) return;
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!stats[k]) stats[k] = { k, year: d.getFullYear(), month: d.getMonth()+1, total: 0, warehouse: 0, china: 0, other: 0, byClient: {} };
    const m = stats[k];
    m.total += amount;
    const sl = (source || '').toLowerCase();
    if (sl === 'china') m.china += amount;
    else if (sl === 'warehouse' || sl === 'er') m.warehouse += amount;
    else m.other += amount;
    if (!m.byClient[client]) m.byClient[client] = { total: 0, sources: {} };
    m.byClient[client].total += amount;
    const ds = sl === 'china' ? 'China' : (sl === 'warehouse' || sl === 'er' ? 'Warehouse' : 'Other');
    m.byClient[client].sources[ds] = (m.byClient[client].sources[ds] || 0) + amount;
  };

  // 只把「出貨」且「已審核」的列算進營業額；ER 進貨 / 未審核都不算
  state.masterData.filter(d => isOutgoingRow(d) && isReviewed(d)).forEach(d => {
    const origin = d.origin || 'Warehouse';
    process(d.date, d.client, thbRound(d.shippedQty, d.price), origin);
  });
  state.manualRevenueData.forEach(d => process(d.date, d.client, Math.round(d.amount), d.source || 'China'));

  const months = Object.values(stats).map(m => ({
    ...m,
    clients: Object.entries(m.byClient).map(([c, v]) => ({ client: c, amount: v.total, sources: v.sources })).sort((a,b) => b.amount - a.amount)
  })).sort((a,b) => b.k.localeCompare(a.k));

  $('#filter-count').textContent = `${months.length} 個月份`;

  if (!months.length) return `<h2>月度營業額 Revenue Stats</h2><div class="card" style="padding:60px; text-align:center; color:var(--text-3);">尚無資料。匯入 CSV 或從 SA App 同步資料後即可看到統計。</div>`;

  const monthsHtml = months.map(m => `
    <div class="card" style="margin-bottom: 16px;">
      <div style="padding: 20px; display:flex; gap:24px; flex-wrap:wrap;">
        <div style="min-width:200px; border-right: 1px solid var(--line-soft); padding-right: 20px;">
          <div style="font-size:11px; color:var(--text-4); font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">${m.year}</div>
          <div style="font-size:42px; font-weight:800; color:var(--text); letter-spacing:-0.02em; line-height:1;">${m.month}</div>
          <div style="font-size:22px; font-weight:800; color:var(--text); margin-top:8px; letter-spacing:-0.01em;">
            <span style="font-size:11px; color:var(--text-4); font-weight:400; margin-right:4px;">THB</span>${fmtInt(m.total)}
          </div>
          <div style="height:3px; background:var(--line-soft); border-radius:99px; margin-top:14px; overflow:hidden;">
            <div style="height:100%; background:var(--text); width:100%;"></div>
          </div>
          <div style="margin-top:16px; padding-top:12px; border-top:1px solid var(--line-soft); display:flex; flex-direction:column; gap:8px;">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
              <span style="color:var(--text-3); font-weight:600;">⌂ Warehouse</span>
              <span class="mono" style="font-weight:700;">${fmtInt(m.warehouse)}</span>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:12px;">
              <span style="color:var(--danger-text); font-weight:600;">✈ China</span>
              <span class="mono" style="font-weight:700; color:var(--danger-text);">${fmtInt(m.china)}</span>
            </div>
            ${m.other > 0 ? `<div style="display:flex; justify-content:space-between; font-size:12px;">
              <span style="color:var(--warn-text); font-weight:600;">+ Other</span>
              <span class="mono" style="font-weight:700; color:var(--warn-text);">${fmtInt(m.other)}</span>
            </div>` : ''}
          </div>
        </div>
        <div style="flex:1;">
          <div style="font-size:10px; color:var(--text-4); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:10px;">依客戶 (Top ${m.clients.length})</div>
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:8px;">
            ${m.clients.map((c,i) => {
              const tot = c.amount;
              const w = c.sources.Warehouse || 0;
              const ch = c.sources.China || 0;
              const ot = c.sources.Other || 0;
              return `<div style="background:var(--bg); padding:10px 12px; border-radius:8px; border:1px solid var(--line);">
                <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
                  <span style="font-size:12px; font-weight:700; color:var(--text);">${i+1}. ${escHtml(c.client)}</span>
                </div>
                <div class="mono" style="font-size:15px; font-weight:700;">${fmtInt(tot)}</div>
                <div style="height:4px; background:var(--line); border-radius:99px; margin-top:6px; overflow:hidden; display:flex;">
                  ${w ? `<div style="background:var(--text-2); width:${(w/tot*100).toFixed(1)}%;" title="W:${fmtInt(w)}"></div>` : ''}
                  ${ch ? `<div style="background:#DC2626; width:${(ch/tot*100).toFixed(1)}%;" title="CN:${fmtInt(ch)}"></div>` : ''}
                  ${ot ? `<div style="background:#F59E0B; width:${(ot/tot*100).toFixed(1)}%;" title="O:${fmtInt(ot)}"></div>` : ''}
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');

  // Manual records 區塊
  const manual = [...state.manualRevenueData].sort((a,b) => new Date(b.date) - new Date(a.date));
  const manualHtml = manual.length ? `
    <h2 style="margin-top: 36px;">📝 Manual Entry Records (${manual.length})</h2>
    <div class="card">
      <table>
        <thead><tr><th>Date</th><th>Client</th><th>C/NO</th><th>Origin</th><th class="text-right">Amount ฿</th><th>Note</th><th></th></tr></thead>
        <tbody>${manual.map(r => `<tr>
          <td class="mono" style="font-size:11px; color:var(--text-3);">${escHtml(r.date)}</td>
          <td><strong>${escHtml(r.client)}</strong></td>
          <td><span class="chip" style="margin:0;">${escHtml(r.cabinetNo || '-')}</span></td>
          <td>${r.source === 'China' ? '<span class="tag tag-cn">CN</span>' : (r.source === 'Warehouse' || r.source === 'ER') ? '<span class="tag tag-er">ER</span>' : '<span class="tag tag-warn">Other</span>'}</td>
          <td class="text-right mono" style="font-weight:700;">${fmtInt(r.amount)}</td>
          <td style="font-size:11px; color:var(--text-3);">${escHtml(r.note || '')}</td>
          <td><button class="btn-ghost btn-icon" data-action="delete-manual" data-id="${escAttr(r.id)}" title="Delete">🗑</button></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>` : '';

  return `<h2>月度營業額 Revenue Stats</h2>${monthsHtml}${manualHtml}`;
}

// ============================================================================
// === Tab 5: 回報老闆 (Boss Restock Report) ==================================
// 對照雲端「0517回報老闆補貨」格式：項次 / 顏色 / 2025出貨 / 2026出貨 /
// 2026庫存 / 庫存-補貨標準 / 已下訂單 / 是否補貨 / 補貨建議
// ============================================================================
function renderBossReport() {
  const todayDisplay = `${new Date().getMonth()+1}月${new Date().getDate()}日`;
  // 預設「全部品相」總覽 — 一進入頁面就看到所有需要補貨的品相
  // 使用 getEffectiveInventory() 而非 MASTER_INVENTORY，這樣新加的 (OC)/(DP) 等也會出現
  const eff = getEffectiveInventory();
  const allProducts = [...new Set(eff.map(s => s.itemName))].sort();
  const focusProduct = state.bossFocus || '__ALL__';
  const isAllMode = focusProduct === '__ALL__';
  // 全部模式：取所有 SKU；單品模式：取該品相所有顏色
  const focusSkus = isAllMode ? eff : eff.filter(s => s.itemName === focusProduct);
  if (!focusSkus.length) { state.bossFocus = allProducts[0]; return renderBossReport(); }

  // 計算每個顏色的數據 (剩餘以 CSV current2026 為主)
  const rows = focusSkus.map((sku, idx) => {
    const outgoing = getOutgoingFor(sku.itemName, sku.color);
    const out2025 = getOut2025(sku.itemName, sku.color);
    const init = sku.init2026 || 0;
    const current = sku.current2026 || 0;
    // 2026 出貨 = 所有 2026 年度出貨流水總和 + CSV 內已扣的基準
    const out2026Flow = outgoing.filter(s => (s.date || '').startsWith('2026')).reduce((a,b) => a + (b.shippedQty || 0), 0);
    const out2026Baseline = sku.out2026 || 0; // CSV 內 init - current 的差，視為「截至 CSV 匯出時的累計出貨」
    const out2026 = Math.max(out2026Baseline, out2026Flow); // 取較大者作為實際出貨
    const safety = sku.safetyLevel || 0;
    const restockStandard = sku.recommendedRestock || safety;
    const deficit = current - safety;
    const needRestock = current < restockStandard;
    return {
      idx: idx + 1,
      product: sku.itemName, // 全部模式下用來顯示哪個品相
      color: sku.color,
      restockStandard,
      out2025,
      out2026,
      stock2026: current,
      deficit,
      needRestock,
      tag: sku.tag
    };
  });

  // 統計 (永遠基於全部 rows)
  const totalSku = rows.length;
  const negCount = rows.filter(r => r.stock2026 < 0).length;
  const needRestockCount = rows.filter(r => r.needRestock).length;
  const totalDeficit = rows.reduce((s,r) => s + Math.min(0, r.deficit), 0);

  // 套用篩選 (但統計卡片數字永遠是全部)
  let displayRows = rows;
  if (state.bossFilter === 'neg') displayRows = rows.filter(r => r.stock2026 < 0);
  else if (state.bossFilter === 'need') displayRows = rows.filter(r => r.needRestock);
  else if (state.bossFilter === 'deficit') displayRows = rows.filter(r => r.deficit < 0);

  return `<h2>回報老闆 Boss Restock Report</h2>
    <div style="display:flex; gap:8px; margin-bottom: 16px; flex-wrap:wrap; align-items:center;">
      <span style="font-size:11px; color:var(--text-4); text-transform:uppercase; font-weight:600;">焦點品相</span>
      <select id="boss-focus" style="border:1px solid var(--line-strong); border-radius:6px; padding:5px 10px; font-size:13px; font-weight:600;">
        <option value="__ALL__" ${isAllMode ? 'selected' : ''}>📋 全部品相 (總覽)</option>
        <option disabled>──────────</option>
        ${allProducts.map(p => `<option value="${escAttr(p)}" ${p === focusProduct ? 'selected' : ''}>${escHtml(p)}</option>`).join('')}
      </select>
      <span style="margin-left:auto; display:flex; gap:8px;">
        <button class="btn btn-secondary" data-action="boss-export-csv">↓ Export CSV</button>
        <button class="btn btn-primary" data-action="window-print">⎙ Print</button>
      </span>
    </div>

// ============================================================================
// === 待澄清 (Needs Review) ===================================================
// 列出系統匯入後「無法 100% 對應到 MASTER_INVENTORY」的列 — 讓使用者可以
// 直接 export CSV 拿去問泰國，或在頁面內手動指派 mapping。
// 大小寫/空格差異 → 已自動處理 (不會出現在這裡)
// 真正不認識的 → 出現在這裡
// ============================================================================
function renderNeedsReview() {
  // 列出所有 reviewed=false 的列。包括：
  // - ER 倉庫進貨/出貨列 (要逐筆審)
  // - 直送列 (通常匯入時自動審，但若使用者誤按「退回待澄清」也會出現在這頁可恢復)
  const unreviewedRows = state.masterData.filter(d => !isReviewed(d));
  const issues = unreviewedRows.map(d => ({
    ...d,
    rawProduct: d.rawProduct || d.product || '',
    rawColor: d.rawColor || d.color || ''
  }));

  // 排序：rawProduct → rawColor → client → 日期，讓拼法相同的列彼此相鄰，方便對照
  issues.sort((a, b) => {
    const pa = (a.rawProduct || '').toUpperCase();
    const pb = (b.rawProduct || '').toUpperCase();
    if (pa !== pb) return pa.localeCompare(pb);
    const ca = (a.rawColor || '').toUpperCase();
    const cb = (b.rawColor || '').toUpperCase();
    if (ca !== cb) return ca.localeCompare(cb);
    const cla = (a.client || '');
    const clb = (b.client || '');
    if (cla !== clb) return cla.localeCompare(clb);
    return dateToSortable(a.date) - dateToSortable(b.date);
  });

  // 統計同 (rawProduct + rawColor) 出現幾筆 — 用於「批次套用」按鈕
  const countByRaw = {};
  issues.forEach(it => {
    const key = `${(it.rawProduct || '').toUpperCase()}||${(it.rawColor || '').toUpperCase()}`;
    countByRaw[key] = (countByRaw[key] || 0) + 1;
  });

  $('#filter-count').textContent = `${issues.length} 筆未審核`;

  if (issues.length === 0) {
    return `<h2>🔍 待澄清 Needs Review</h2>
      <div class="card" style="padding:60px; text-align:center; color:var(--text-3);">
        ✓ 目前沒有待審核的列。所有匯入資料都已通過審核。<br><br>
        <span style="font-size:11px;">新匯入 CSV 後，列會自動標為「未審核」並出現在這頁，按 ✓ 後才算進庫存/請款單。</span>
      </div>`;
  }

  const allProducts = [...new Set(MASTER_INVENTORY.map(s => s.itemName))].sort();
  const colorsByProduct = {};
  MASTER_INVENTORY.forEach(s => {
    if (!colorsByProduct[s.itemName]) colorsByProduct[s.itemName] = new Set();
    colorsByProduct[s.itemName].add(s.color);
  });

  // 用於畫「同拼法群組」之間的分隔線
  let lastRawKey = null;

  return `<h2>🔍 待澄清 (${issues.length} 筆未審核)</h2>
    <div style="background:var(--warn-bg); border:1px solid var(--warn-line); border-radius:8px; padding:12px 16px; margin-bottom:14px; font-size:12px; color:var(--text-2); line-height:1.7;">
      <strong>📋 審核制流程</strong>：每一筆都獨立列出，可以看到日期、客戶、櫃號，方便對照。<br>
      按 <strong>✓</strong> 同意該筆 → 進庫存/請款單。如果你改了 mapping 並按 ⚡，會套用到所有同拼法的列，省時間。<br>
      系統會自動記成 <strong>(客戶+品名+顏色) PAIR mapping</strong>，下次同樣 CSV 不會再進待澄清。
    </div>
    <div style="margin-bottom:12px; display:flex; gap:10px; align-items:center;">
      <span style="font-size:12px; color:var(--text-3);">本頁顯示 ${issues.length} 筆 ER 相關 (要你逐筆審)${(() => {
        const pendingDirect = state.masterData.filter(d => {
          if (isReviewed(d)) return false;
          const k = d.kind || parseClientCell(d.client).kind;
          return k === 'direct';
        }).length;
        return pendingDirect > 0 ? `<span style="margin-left:8px; color:var(--warn-text);">⚠ 另有 ${pendingDirect} 筆直送列待清理 → 按右邊按鈕一鍵搞定</span>` : '';
      })()}</span>
      <span style="margin-left:auto; display:flex; gap:8px;">
        <button class="btn btn-secondary" data-action="bulk-delete-before-date">🗑 批次刪除某日前未審</button>
        <button class="btn btn-secondary" data-action="auto-approve-direct">⚡ 一鍵自動審核所有直送列</button>
        <button class="btn btn-secondary" data-action="export-needs-review">↓ 下載 CSV 給泰國問</button>
      </span>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th style="width:90px;">日期</th>
          <th>客戶</th>
          <th style="width:90px;">櫃號/單號</th>
          <th>CSV 品名</th>
          <th>CSV 顏色</th>
          <th class="text-right" style="width:70px;">碼數</th>
          <th style="min-width:170px;">→ 對到品名</th>
          <th style="min-width:170px;">→ 對到顏色</th>
          <th style="width:120px;">動作</th>
        </tr></thead>
        <tbody>
          ${issues.map((it) => {
            // 高信心預測 — 只在「PAIR mapping / 字典精確 / MASTER 直接 / 寬鬆英數比對唯一匹配」時才回傳
            // smart match 的猜測（可能把 C4 誤判成 385）不會在這裡預選，保留 __KEEP__ 給使用者選
            const highConfPredict = normalizeProductNameHighConfidence(it.rawProduct, it.rawColor, it.client);
            const predicted = highConfPredict || it.rawProduct; // 顯示用 (沒高信心 → 用 raw)
            const shouldPreselectPredict = !!highConfPredict; // 是否預選 dropdown
            // 顏色：先試直接比對 MASTER 顏色（大小寫無關）— 例如 raw "BLACK" → MASTER 的 "Black"
            // 若有匹配的標準色，直接預選；否則才看 normalizeColorName 結果
            const candidateColors = colorsByProduct[predicted] ? [...colorsByProduct[predicted]].sort() : [];
            const rawColorUpper = (it.rawColor || '').trim().toUpperCase();
            const exactColorMatch = candidateColors.find(c => c.toUpperCase() === rawColorUpper);
            const predictedColor = exactColorMatch || (highConfPredict ? normalizeColorName(it.rawColor, predicted, it.client) : it.rawColor);
            // 只要找得到對應的 MASTER 顏色就預選 (即使大小寫不同) — 讓使用者明確看到「會對到哪個」
            const shouldPreselectColor = !!exactColorMatch || (!!highConfPredict && (predictedColor || '').toUpperCase() !== (it.rawColor || '').toUpperCase());
            // 優先用儲存的 kind / stockTag（匯入時已決定）— 不要重新 parseClientCell 客戶字串
            // 避免把 "ER" (含空格、不同大小寫) 誤判成直送
            const storedKind = it.kind || parseClientCell(it.client).kind;
            const storedStockTag = it.stockTag || parseClientCell(it.client).stockTag;
            // 標籤要看 kind + origin 兩者：
            //   kind=direct + origin=ER → ER 出貨給客戶（檔名沒 china 的 CSV）
            //   kind=direct + origin=China → 中國直送（檔名有 china 的 CSV）
            //   kind=warehouse → ER 進貨
            //   kind=warehouse-tagged → ER(XXX) 進貨
            let tagBadge = '';
            if (storedKind === 'direct') {
              tagBadge = it.origin === 'China'
                ? '<span class="tag tag-cn" style="font-size:10px; margin-left:4px;">中國直送</span>'
                : '<span class="tag tag-er" style="font-size:10px; margin-left:4px;">ER 出貨</span>';
            } else if (storedKind === 'warehouse') {
              tagBadge = '<span class="tag tag-er" style="font-size:10px; margin-left:4px;">ER 進貨</span>';
            } else if (storedKind === 'warehouse-tagged') {
              tagBadge = `<span class="tag tag-warn" style="font-size:10px; margin-left:4px;">ER(${storedStockTag || '?'}) 進貨</span>`;
            }
            const rawKey = `${(it.rawProduct || '').toUpperCase()}||${(it.rawColor || '').toUpperCase()}`;
            const isFirstOfGroup = rawKey !== lastRawKey;
            const groupCount = countByRaw[rawKey] || 1;
            lastRawKey = rawKey;
            const sepStyle = isFirstOfGroup ? 'border-top: 2px solid var(--line-strong);' : '';
            const cabinDisp = (it.cabinetNo && !['N/A','n/a','-','—'].includes((it.cabinetNo || '').trim())) ? it.cabinetNo : (it.orderNo || '—');
            return `<tr data-row-id="${escAttr(it.id)}" style="${sepStyle}">
              <td class="mono" style="font-size:11px; color:var(--text-3);">${escHtml(it.date || '-')}</td>
              <td><strong>${escHtml(it.client || '?')}</strong>${tagBadge}</td>
              <td class="mono" style="font-size:11px;">${escHtml(cabinDisp)}</td>
              <td class="mono" style="font-weight:600;">${escHtml(it.rawProduct || '(空白)')}</td>
              <td class="mono">${escHtml(it.rawColor || '(空白)')}</td>
              <td class="text-right mono">${fmtInt(it.shippedQty || 0)}</td>
              <td>
                <select class="review-product-pick" data-row-id="${escAttr(it.id)}" style="width:100%; padding:4px 6px; border:1px solid var(--line-strong); border-radius:5px; font-size:11px;">
                  <option value="__KEEP__" ${!shouldPreselectPredict ? 'selected' : ''} style="color:var(--text-2);">✓ 保留原名 (${escHtml(it.rawProduct || '空')})</option>
                  <option value="__CUSTOM__" style="color:var(--info-text); font-weight:600;">✏️ 自訂新品相...</option>
                  <option disabled>──────────</option>
                  ${allProducts.map(p => `<option value="${escAttr(p)}" ${shouldPreselectPredict && p === predicted ? 'selected' : ''}>${escHtml(p)}</option>`).join('')}
                </select>
              </td>
              <td>
                <select class="review-color-pick" data-row-id="${escAttr(it.id)}" style="width:100%; padding:4px 6px; border:1px solid var(--line-strong); border-radius:5px; font-size:11px;">
                  <option value="__KEEP__" ${!shouldPreselectColor ? 'selected' : ''} style="color:var(--text-2);">✓ 保留原色 (${escHtml(it.rawColor || '空')})</option>
                  <option value="__CUSTOM__" style="color:var(--info-text); font-weight:600;">✏️ 自訂新顏色...</option>
                  ${candidateColors.length ? `<option disabled>── ${escHtml(predicted)} 內既有顏色 ──</option>` : ''}
                  ${candidateColors.map(c => `<option value="${escAttr(c)}" ${shouldPreselectColor && c === predictedColor ? 'selected' : ''}>${escHtml(c)}</option>`).join('')}
                </select>
              </td>
              <td style="white-space:nowrap;">
                <button class="btn btn-primary" data-action="approve-row" data-id="${escAttr(it.id)}" style="padding:4px 8px; font-size:11px;" title="只審核這一筆">✓</button>
                ${groupCount > 1 ? `<button class="btn btn-secondary" data-action="approve-batch-by-raw" data-id="${escAttr(it.id)}" style="padding:4px 8px; font-size:11px;" title="套用這個 mapping 到所有 ${groupCount} 筆同拼法的列">⚡${groupCount}</button>` : ''}
                <button class="btn-ghost btn-icon" data-action="skip-row" data-id="${escAttr(it.id)}" title="跳過 (刪掉這筆)" style="padding:4px;">🗑</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// 審核單列 — 只更新這一筆 + 若改了 mapping 記成 PAIR
// 效能：不跑 full render()，直接從 DOM 移除該列。等下次自然 render 時內容會同步。
async function approveRow(rowId) {
  const row = state.masterData.find(d => d.id === rowId);
  if (!row) { alert('找不到該列'); return; }
  const tr = document.querySelector(`tr[data-row-id="${CSS.escape(rowId)}"]`);
  if (!tr) { alert('找不到該列畫面元素'); return; }
  const productSel = tr.querySelector('.review-product-pick');
  const colorSel = tr.querySelector('.review-color-pick');
  const productPick = productSel?.value;
  const colorPick = colorSel?.value;
  const rawProduct = row.rawProduct || row.product || '';
  const rawColor = row.rawColor || row.color || '';
  const targetProduct = (productPick === '__KEEP__') ? rawProduct : productPick;
  const targetColor = (colorPick === '__KEEP__') ? rawColor : colorPick;
  // 1. 立即更新本地 state (但不 render — 太慢)
  const idx = state.masterData.findIndex(d => d.id === rowId);
  if (idx >= 0) {
    state.masterData[idx] = { ...state.masterData[idx], reviewed: true, product: targetProduct, color: targetColor };
    bumpMasterDataVersion();
  }
  // 2. 即時把 DOM 那一列移除 (淡出動畫) — 比 full render 快 100 倍
  tr.style.transition = 'opacity 0.18s, transform 0.18s';
  tr.style.opacity = '0';
  tr.style.transform = 'translateX(8px)';
  setTimeout(() => tr.remove(), 180);
  // 3. 背景：寫入 Firestore + PAIR mapping
  try {
    await updateDoc(doc(db, ...ROOT, 'master_data', rowId), {
      reviewed: true,
      product: targetProduct,
      color: targetColor
    });
    if (productPick !== '__KEEP__' || colorPick !== '__KEEP__') {
      const newPairs = { ...(state.userMappings?.pairs || {}) };
      const pairKey = (row.client || '').toUpperCase() + '||' + rawProduct.toUpperCase() + '||' + rawColor.toUpperCase();
      newPairs[pairKey] = { product: targetProduct, color: targetColor };
      await setDoc(doc(db, ...ROOT, 'settings', 'userMappings'), { pairs: newPairs }, { merge: true });
      state.userMappings.pairs = newPairs;
    }
  } catch (e) {
    alert('審核失敗：' + e.message);
    // 失敗 → 回滾本地狀態 + 重新 render 把列補回
    if (idx >= 0) { state.masterData[idx] = { ...row }; bumpMasterDataVersion(); }
    render();
  }
}

// 套用本列 mapping 到「所有同 (rawProduct + rawColor) 的未審列」— 跨客戶
async function approveBatchByRaw(rowId) {
  const row = state.masterData.find(d => d.id === rowId);
  if (!row) { alert('找不到該列'); return; }
  const tr = document.querySelector(`tr[data-row-id="${CSS.escape(rowId)}"]`);
  if (!tr) { alert('找不到該列畫面元素'); return; }
  const productSel = tr.querySelector('.review-product-pick');
  const colorSel = tr.querySelector('.review-color-pick');
  const productPick = productSel?.value;
  const colorPick = colorSel?.value;
  const rawProduct = row.rawProduct || row.product || '';
  const rawColor = row.rawColor || row.color || '';
  const targetProduct = (productPick === '__KEEP__') ? rawProduct : productPick;
  const targetColor = (colorPick === '__KEEP__') ? rawColor : colorPick;
  const matching = state.masterData.filter(d => {
    if (isReviewed(d)) return false;
    const k = d.kind || parseClientCell(d.client).kind;
    if (k === 'direct') return false;
    return (d.rawProduct || d.product || '').toUpperCase() === rawProduct.toUpperCase() &&
           (d.rawColor || d.color || '').toUpperCase() === rawColor.toUpperCase();
  });
  if (!matching.length) { alert('找不到同拼法的未審核列'); return; }
  if (!confirm(`把這個 mapping (${rawProduct}/${rawColor} → ${targetProduct}/${targetColor}) 套用到所有 ${matching.length} 筆同拼法的列？`)) return;
  try {
    // Firestore 一次最多 500 個操作，分批 commit
    const allClients = new Set();
    for (let i = 0; i < matching.length; i += 400) {
      const batch = writeBatch(db);
      matching.slice(i, i + 400).forEach(d => {
        batch.update(doc(db, ...ROOT, 'master_data', d.id), {
          reviewed: true,
          product: targetProduct,
          color: targetColor
        });
        allClients.add(d.client || '');
      });
      await batch.commit();
    }
    // 若改了 mapping，幫每個出現過的客戶都記成 PAIR mapping
    if (productPick !== '__KEEP__' || colorPick !== '__KEEP__') {
      const newPairs = { ...(state.userMappings?.pairs || {}) };
      allClients.forEach(cli => {
        const pairKey = cli.toUpperCase() + '||' + rawProduct.toUpperCase() + '||' + rawColor.toUpperCase();
        newPairs[pairKey] = { product: targetProduct, color: targetColor };
      });
      await setDoc(doc(db, ...ROOT, 'settings', 'userMappings'), { pairs: newPairs }, { merge: true });
      state.userMappings.pairs = newPairs;
    }
  } catch (e) { alert('批次審核失敗：' + e.message); }
}

// 跳過單列 — 直接刪除
async function skipRow(rowId) {
  if (!confirm('跳過這一筆？\n會永久刪除。')) return;
  // 樂觀更新：立即從本地 state 移除
  const idx = state.masterData.findIndex(d => d.id === rowId);
  const removed = idx >= 0 ? state.masterData[idx] : null;
  if (idx >= 0) {
    state.masterData.splice(idx, 1);
    bumpMasterDataVersion();
    render();
  }
  try {
    await deleteDoc(doc(db, ...ROOT, 'master_data', rowId));
  } catch (e) {
    alert('刪除失敗：' + e.message);
    if (removed) { state.masterData.splice(idx, 0, removed); bumpMasterDataVersion(); render(); }
  }
}

// 跳過某組 — 整組刪除
// ============================================================================
// === Tab 6: 資料管理 (Data Management) ======================================

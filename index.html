function renderDataManagement() {
  // 依 source 分組，並算出日期範圍 + 已審/未審狀態
  const bySource = {};
  state.masterData.forEach(d => {
    const src = d.source || '(unknown)';
    if (!bySource[src]) bySource[src] = {
      count: 0, lastTs: 0, totalQty: 0, clients: new Set(),
      firstDate: null, lastDate: null,
      reviewedCount: 0, unreviewedCount: 0
    };
    const b = bySource[src];
    b.count++;
    b.totalQty += d.shippedQty || 0;
    if (d.client) b.clients.add(d.client);
    if (d.timestamp && d.timestamp > b.lastTs) b.lastTs = d.timestamp;
    if (d.date) {
      const sortable = dateToSortable(d.date);
      if (!b.firstDate || sortable < dateToSortable(b.firstDate)) b.firstDate = d.date;
      if (!b.lastDate || sortable > dateToSortable(b.lastDate)) b.lastDate = d.date;
    }
    if (isReviewed(d)) b.reviewedCount++;
    else b.unreviewedCount++;
  });
  const sources = Object.entries(bySource).sort((a,b) => b[1].lastTs - a[1].lastTs);
  // 使用者自訂的批次顯示名 (存 Firestore settings/batchNames，但本地 mirror 在 state.batchNames)
  const batchNames = state.batchNames || {};

  return `<h2>資料管理 Data Management</h2>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-hdr">
        <span>匯入批次 (${sources.length} 個)</span>
        <span style="font-size:11px; color:var(--text-4);">點 ✎ 改顯示名 · 點 🗑 批次刪整批</span>
      </div>
      <table>
        <thead><tr>
          <th>批次 / 來源檔</th>
          <th>資料日期範圍</th>
          <th class="text-right">筆數</th>
          <th class="text-right">總碼數</th>
          <th>客戶</th>
          <th>匯入時間</th>
          <th style="width:140px;"></th>
        </tr></thead>
        <tbody>
          ${sources.length === 0 ? '<tr><td colspan="7" class="empty">尚無資料來源 — 從上方 Import CSV 開始</td></tr>' : ''}
          ${sources.map(([src, info]) => {
            const customName = batchNames[src];
            const dateRange = info.firstDate && info.lastDate
              ? (info.firstDate === info.lastDate ? info.firstDate : `${info.firstDate} ~ ${info.lastDate}`)
              : '—';
            const reviewSummary = info.unreviewedCount > 0
              ? `<span style="color:var(--warn-text);">⏳ ${info.unreviewedCount} 未審</span> / ${info.reviewedCount} 已審`
              : `<span style="color:var(--success-text, var(--text-3));">✓ ${info.reviewedCount} 全已審</span>`;
            return `<tr>
              <td style="word-break:break-all;">
                ${customName ? `<div style="font-weight:600; font-size:13px;">${escHtml(customName)}</div><div class="mono" style="font-size:10px; color:var(--text-4);">${escHtml(src)}</div>` : `<div class="mono" style="font-weight:600;">${escHtml(src)}</div>`}
                <div style="font-size:10px; color:var(--text-3); margin-top:2px;">${reviewSummary}</div>
              </td>
              <td class="mono" style="font-size:11px; color:var(--text-2);">${escHtml(dateRange)}</td>
              <td class="text-right mono">${fmtInt(info.count)}</td>
              <td class="text-right mono">${fmtInt(info.totalQty)}</td>
              <td style="font-size:11px; color:var(--text-3);">${[...info.clients].slice(0,6).join(', ')}${info.clients.size > 6 ? '…' : ''}</td>
              <td class="mono" style="font-size:11px; color:var(--text-3);">${info.lastTs ? new Date(info.lastTs).toLocaleDateString() : '-'}</td>
              <td style="white-space:nowrap;">
                <button class="btn-ghost btn-icon" data-action="rename-batch" data-source="${escAttr(src)}" title="改顯示名稱">✎</button>
                <button class="btn btn-danger" data-action="delete-source" data-source="${escAttr(src)}" style="padding:3px 8px; font-size:11px;">🗑</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="card" style="padding:18px;">
      <h3 style="font-size:14px; margin-bottom:10px;">📥 統一 CSV 匯入格式（出貨 + 進貨同一張表）</h3>
      <p style="font-size:12px; color:var(--text-3); margin-bottom:12px; line-height:1.6;">
        直接用你 <code>order-tracking-china</code> 的格式，<strong>把 ER 倉庫進貨的列加進去</strong>，欄位順序：<br>
        <code class="mono" style="background:var(--bg); padding:4px 8px; border-radius:4px; display:inline-block; margin-top:6px; border:1px solid var(--line);">
          Ship Date,Client,Product Name,Color,Quantity,Unit Price,total
        </code>
      </p>
      <p style="font-size:12px; color:var(--text-3); margin-bottom:8px; line-height:1.7;">
        <strong>Client 欄寫法決定一切：</strong>
      </p>
      <table style="font-size:12px; margin-bottom:12px;">
        <thead><tr><th>Client 寫法</th><th>意義</th><th>系統行為</th></tr></thead>
        <tbody>

    </div>
    <div class="card" style="padding:18px; margin-top:14px;">

// ============================================================================
// === CSV Import =============================================================
// 兩階段流程：(1) 先 parse 所有列、找出 unmapped 品名/顏色 → 跳 modal 給使用者選
//          (2) 使用者完成 mapping 後 → 把 mappings 存到 Firestore 並寫入 master_data
// ============================================================================
async function handleCsvUpload(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  state.isUploading = true;
  $('#csv-btn-text').textContent = 'Processing…';
  try {
    for (const file of files) {
      const text = await file.text();
      const rows = text.split(/\r?\n/).filter(r => r.trim());
      if (!rows.length) continue;
      const headers = rows[0].split(',').map(h => h.trim().toLowerCase());

      // 特殊：貨櫃明細 CSV (有 container 欄)
      if (headers.includes('container') && headers.includes('client') && headers.includes('product')) {
        const isChina = file.name.toLowerCase().includes('china');
        const idx = {
          container: headers.indexOf('container'),
          date: headers.indexOf('date'),
          client: headers.indexOf('client'),
          product: headers.indexOf('product'),
          color: headers.indexOf('color'),
          qty: headers.indexOf('qty'),
          packing: headers.indexOf('packing'),
          price: headers.indexOf('price')
        };
        const parseCsvRow = (row) => {
          const cols = []; let cur = '', inQ = false;
          for (let i = 0; i < row.length; i++) {
            const ch = row[i];
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
            else cur += ch;
          }
          cols.push(cur.trim());
          return cols;
        };
        let imported = 0;
        for (let rIdx = 1; rIdx < rows.length; rIdx++) {
          const cols = parseCsvRow(rows[rIdx]);
          if (cols.length < 4) continue;
          const containerNo = (cols[idx.container] || '').replace(/"/g, '');
          const clientRaw = (cols[idx.client] || '').replace(/"/g, '');
          const parsed = parseClientCell(clientRaw);
          const productRaw = (cols[idx.product] || '').replace(/"/g, '');
          const colorRaw = (cols[idx.color] || '').replace(/"/g, '');
          const product = normalizeProductName(productRaw);
          const color = normalizeColorName(colorRaw, productRaw);
          const qty = sanitizeQuantity(cols[idx.qty]);
          const price = idx.price !== -1 ? (parseFloat((cols[idx.price] || '').replace(/[^\d.\-]/g, '')) || 0) : 0;
          const packing = idx.packing !== -1 ? (cols[idx.packing] || '').replace(/"/g, '') : '';
          const origin = parsed.kind === 'direct' ? 'China' : (isChina ? 'China' : 'ER');
          const id = `${containerNo}-${rIdx}-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
          await setDoc(doc(db, ...ROOT, 'master_data', id), {
            date: cols[idx.date] || '',
            client: parsed.client,
            stockTag: parsed.stockTag || null,
            product, color,
            shippedQty: qty,
            shippedDisplay: packing || String(qty),
            price,
            orderQty: 0,
            cabinetNo: containerNo,
            orderNo: containerNo,
            status: '',
            note: parsed.kind === 'warehouse-tagged' ? `Warehouse stock for ${parsed.stockTag}` : (parsed.kind === 'warehouse' ? 'ER warehouse stock' : 'Direct ship to client'),
            source: file.name,
            origin,
            kind: parsed.kind, // warehouse / warehouse-tagged / direct
            timestamp: Date.now()
          });
          imported++;
        }
        continue;
      }
      // 特殊：client config CSV
      if (headers.includes('client') && headers.includes('number')) {
        const cfg = { ...state.clientConfig };
        rows.slice(1).forEach(r => {
          const [c, n] = r.split(',');
          if (c && n) cfg[c.toUpperCase().trim()] = { startNo: parseInt(n) || 1, prefix: c.toUpperCase().trim() };
        });
        await setDoc(doc(db, ...ROOT, 'settings', 'config'), { clientConfig: cfg }, { merge: true });
        continue;
      }

      const isChina = file.name.toLowerCase().includes('china');
      const origin = isChina ? 'China' : 'ER';

      const getIdx = (keys) => {
        const exact = headers.findIndex(h => keys.includes(h));
        if (exact !== -1) return exact;
        return headers.findIndex(h => keys.some(k => h.includes(k)));
      };
      const idx = {
        date: getIdx(['date', '日期']),
        client: getIdx(['client', '客戶']),
        product: getIdx(['product', '品名', 'spec']),
        color: getIdx(['color', '顏色']),
        shipped: getIdx(['shipped', 'quantity', '數量', '出貨']),
        price: (() => {
          const wl = ['price', 'unit price', '單價'];
          const ex = headers.findIndex(h => wl.includes(h));
          if (ex !== -1) return ex;
          return headers.findIndex(h => h.includes('price') && !h.includes('total') && !h.includes('subtotal'));
        })(),
        cabinet: getIdx(['cabinet', 'c/no', '櫃號']),
        order: getIdx(['order no', 'order_no', 'order', '訂單']),
        status: getIdx(['status', '結案']),
        note: getIdx(['note', '備註']),
        orderQty: getIdx(['order qty', 'order quantity', '訂單量', '訂量'])
      };

      const parseRow = (row) => {
        const cols = [];
        let cur = '', inQ = false;
        for (let i = 0; i < row.length; i++) {
          const ch = row[i];
          if (ch === '"') inQ = !inQ;
          else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
          else cur += ch;
        }
        cols.push(cur.trim());
        return cols;
      };

      // 第一階段：先把所有列 parse 出來，準備好 staged rows
      const stagedRows = [];
      rows.slice(1).forEach((row, rIdx) => {
        const cols = parseRow(row);
        if (cols.length < 3) return;
        const rawProduct = (cols[idx.product] || '').replace(/"/g, '').trim();
        const rawColor = (cols[idx.color] || '').replace(/"/g, '').trim();
        const rawQty = cols[idx.shipped];
        const shippedQty = sanitizeQuantity(rawQty);
        const rawClient = (cols[idx.client] || 'UNKNOWN').replace(/"/g, '').trim();
        const parsedClient = parseClientCell(rawClient);
        const rowDate = cols[idx.date] || '';
        // 匯入日期過濾 — 若設定 localStorage.everise_csv_import_after，跳過該日期之前的列
        // 主要用於 GSheets 自動同步 — 避免每次拉整份試算表都把舊月份重新匯入
        const cutoffAfter = localStorage.getItem('everise_csv_import_after') || '';
        if (cutoffAfter && rowDate) {
          if (dateToSortable(rowDate) < dateToSortable(cutoffAfter)) return; // 跳過
        }
        // origin 直接依 CSV 檔名決定（China CSV → 'China'，其他 → 'ER'）
        // 之前的 ternary 邏輯會把 warehouse 列強制標 'China'，導致 ER 倉自己的紀錄被誤標
        const finalOrigin = origin;
        stagedRows.push({
          rIdx,
          rawProduct, rawColor,
          rawClient, parsedClient,
          shippedQty, rawQty,
          finalOrigin,
          date: rowDate,
          price: idx.price !== -1 ? (parseFloat((cols[idx.price] || '').replace(/[^\d.\-]/g, '')) || 0) : 0,
          orderQty: idx.orderQty !== -1 ? (parseFloat((cols[idx.orderQty] || '').replace(/[^\d.\-]/g, '')) || 0) : 0,
          cabinetNo: idx.cabinet !== -1 ? (cols[idx.cabinet] || '').replace(/"/g, '') : '',
          orderNo: idx.order !== -1 ? cols[idx.order] : 'N/A',
          status: idx.status !== -1 ? cols[idx.status] : '',
          note: idx.note !== -1 ? cols[idx.note] : ''
        });
      });

      // 新流程 (大改版)：所有列直接寫入但標 reviewed=false
      // 不再跳模態框讓使用者一筆一筆選——改成統一在「待澄清」頁逐筆審核 (帶 pre-fill)
      // 庫存/請款單只看 reviewed=true 的列
      // === 漂移偵測 (drift detection) ===
      // 匯入前先收集「同檔名既有列」的 ID。匯入後比對：哪些既有 ID 沒有出現在這次 CSV 內 → 可能被泰國刪除/修改了
      const previousIdsForSource = new Set(state.masterData.filter(d => d.source === file.name).map(d => d.id));
      const stats = await writeStagedRows(stagedRows, file.name);
      // 算 orphans = 之前有 source=file.name 的 ID 但這次沒寫入也沒被 dedup 認識
      // (stats.newIdsThisImport 是「這次匯入產生的所有 ID 集合」 — 包含寫入的 + 被 dedup 跳過的)
      const orphanIds = [...previousIdsForSource].filter(id => !stats.allIdsThisImport.has(id));
      const orphans = orphanIds.map(id => state.masterData.find(d => d.id === id)).filter(Boolean);
      console.log(`[${file.name}] 寫入 ${stats.writtenCount}, 去重跳過 ${stats.dedupedCount}, 漂移偵測 ${orphans.length} 筆`);
      if (stats.dedupedRows && stats.dedupedRows.length) {
        console.warn(`[${file.name}] 被跳過的 ${stats.dedupedRows.length} 筆 (跟既有資料完全相同):`);
        console.table(stats.dedupedRows);
      }
      if (orphans.length) {
        console.warn(`[${file.name}] ⚠️ 漂移偵測 — 以下 ${orphans.length} 筆「之前有、這次 CSV 沒有」(可能被泰國刪改):`);
        console.table(orphans.map(o => ({ date: o.date, client: o.client, product: o.product, color: o.color, qty: o.shippedQty, orderNo: o.orderNo, reviewed: o.reviewed, id: o.id })));
      }
      window.__lastImportStats = window.__lastImportStats || { written: 0, deduped: 0, orphans: 0, dedupedRows: [], orphanRows: [] };
      window.__lastImportStats.written += stats.writtenCount;
      window.__lastImportStats.deduped += stats.dedupedCount;
      window.__lastImportStats.orphans += orphans.length;
      window.__lastImportStats.dedupedRows = (window.__lastImportStats.dedupedRows || []).concat(stats.dedupedRows || []);
      window.__lastImportStats.orphanRows = (window.__lastImportStats.orphanRows || []).concat(orphans);
    }
    const s = window.__lastImportStats || { written: 0, deduped: 0, orphans: 0, dedupedRows: [], orphanRows: [] };
    let msg = `✓ 匯入完成：${files.length} 個檔案\n寫入 ${s.written} 筆，去重跳過 ${s.deduped} 筆`;
    if (s.orphans > 0) {
      msg += `\n⚠️ 漂移偵測：${s.orphans} 筆「之前有、這次 CSV 沒有」`;
    }
    if (s.deduped > 0 && s.dedupedRows && s.dedupedRows.length) {
      msg += `\n\n被跳過的 ${s.dedupedRows.length} 筆 (跟既有資料完全相同)：`;
      const preview = s.dedupedRows.slice(0, 5).map(d => `• ${d.date} · ${d.client} · ${d.product || ''} ${d.color || ''} · ${d.qty}Y${d.orderNo ? ' · #'+d.orderNo : ''}`).join('\n');
      msg += `\n${preview}`;
      if (s.dedupedRows.length > 5) msg += `\n... 還有 ${s.dedupedRows.length - 5} 筆，F12 → Console 看完整`;
    }
    if (s.orphans > 0 && s.orphanRows && s.orphanRows.length) {
      msg += `\n\n⚠️ 漂移列表 (可能被泰國刪改 — 之前匯入時有、這次 CSV 沒有)：`;
      const preview = s.orphanRows.slice(0, 5).map(d => `• ${d.date} · ${d.client} · ${d.product || ''} ${d.color || ''} · ${d.shippedQty}Y${d.orderNo ? ' · #'+d.orderNo : ''}`).join('\n');
      msg += `\n${preview}`;
      if (s.orphanRows.length > 5) msg += `\n... 還有 ${s.orphanRows.length - 5} 筆，F12 → Console 看完整`;
      msg += `\n\n→ 去「出貨追蹤」搜尋這些日期，確認泰國是不是真的刪/改了。若是 → 手動更新或刪除即可。`;
    }
    alert(msg);
    window.__lastImportStats = null;
    state.view = 'dashboard';
    render();
  } catch (err) {
    console.error(err);
    alert(`匯入失敗：${err.message}\n\n如果是 Firebase 權限錯誤，請去 Firestore Rules 設定 "allow read, write: if true;"`);
  } finally {
    state.isUploading = false;
    $('#csv-btn-text').textContent = 'Import CSV';
    e.target.value = '';
  }
}

// 把 staged rows 真正寫進 Firestore (套用 mappings 之後)
// 簡單穩定 hash：把字串轉成 base36，碰撞機率極低 (>2^31 範圍)
function stableHash(str) {
  let h1 = 0x811c9dc5, h2 = 0xdeadbeef;
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 2654435761);
    h2 = Math.imul(h2 ^ c, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
  h1 = Math.imul(h1 ^ (h1 >>> 13), 3266489909);
  h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
  h2 = Math.imul(h2 ^ (h2 >>> 13), 3266489909);
  return (4294967296 * (2097151 & h2) + (h1 >>> 0)).toString(36);
}

// 用「日期+客戶+品名+顏色+數量+櫃號+kind+訂單號」生穩定 ID
// 重複上傳完全一樣的 CSV 會 overwrite 同一個 doc，不會新增重複列。
// 但 orderNo 不同 → 視為不同筆 (即使其他欄位都一樣) — 保護真實獨立訂單
function makeStableRowId(r, productName, colorName) {
  const key = [
    r.date || '',
    r.parsedClient.client || '',
    r.parsedClient.stockTag || '',
    productName || '',
    colorName || '',
    r.shippedQty || 0,
    r.cabinetNo || '',
    r.parsedClient.kind || '',
    (r.orderNo || '').trim() // 加入訂單號 — 同日同品同色但不同訂單 = 不同筆
  ].join('|').toUpperCase();
  return 'row_' + stableHash(key);
}

async function writeStagedRows(stagedRows, filename) {
  const skipSet = state.pendingImport?.decisions?.skip || new Set();
  // 既有 IDs + 對應的列摘要（給「為什麼被跳過」用）
  const existingMap = new Map(state.masterData.map(d => [d.id, d]));
  let writtenCount = 0, dedupedCount = 0;
  const dedupedRows = []; // 收集被跳過的列詳情
  const allIdsThisImport = new Set(); // 這次 CSV 產生的所有 ID (寫入的 + 被 dedup 跳過的都算)
  const promises = stagedRows.map(r => {
    if (skipSet.has(r.rIdx)) return null;
    // 新流程：匯入時不自動 normalize，全部存 raw 給使用者在待澄清頁手動審核
    // 這樣使用者完全掌控每一筆的最終品名/顏色，不會被系統自作主張歸錯類
    const isDirect = r.parsedClient.kind === 'direct';
    const clientRaw = r.parsedClient.client;
    const productName = r.rawProduct;
    const colorName = r.rawColor;
    const id = makeStableRowId(r, productName, colorName);
    allIdsThisImport.add(id); // 不管寫不寫，都算「這次 CSV 出現過的 ID」
    if (existingMap.has(id)) {
      dedupedCount++;
      // 紀錄這筆為什麼被跳過：raw 列 + 既有列的對照
      const existing = existingMap.get(id);
      dedupedRows.push({
        date: r.date, client: r.parsedClient.client, product: productName, color: colorName,
        qty: r.shippedQty, cabin: r.cabinetNo, orderNo: r.orderNo,
        existingId: id,
        existingSource: existing.source || '?'
      });
      return null; // 同樣的列已存在 → 跳過，避免重複扣庫存
    }
    writtenCount++;
    existingMap.set(id, { source: filename }); // 防止同次匯入內也有重複
    // 新流程：所有列都標未審核，使用者在「待澄清」逐筆/批次審
    // 不再自動審核直送列 — 因為使用者要對每一筆的品名/顏色把關
    const autoReviewed = false;
    return setDoc(doc(db, ...ROOT, 'master_data', id), {
      date: r.date,
      client: r.parsedClient.client,
      stockTag: r.parsedClient.stockTag || null,
      kind: r.parsedClient.kind,
      flow: r.parsedClient.flow,
      product: productName,
      rawProduct: r.rawProduct,
      color: colorName,
      rawColor: r.rawColor,
      shippedQty: r.shippedQty,
      shippedDisplay: r.rawQty || String(r.shippedQty),
      price: r.price,
      orderQty: r.orderQty,
      cabinetNo: r.cabinetNo,
      orderNo: r.orderNo,
      status: r.status,
      note: r.note,
      source: filename,
      origin: r.finalOrigin,
      reviewed: autoReviewed,
      timestamp: Date.now()
    });
  }).filter(p => p);
  await Promise.all(promises);
  return { writtenCount, dedupedCount, dedupedRows, allIdsThisImport };
}

// 套用 mapping → 存 Firestore → 寫入 staged rows
async function applyMappingsAndImport() {
  const p = state.pendingImport;
  if (!p) return;
  const productPicks = {};
  $$('.map-product-pick').forEach(sel => { productPicks[sel.dataset.raw] = sel.value; });
  const colorPicks = {};
  $$('.map-color-pick').forEach(sel => {
    colorPicks[`${sel.dataset.rawProduct}||${sel.dataset.rawColor}`] = sel.value;
  });

  // 驗證：所有都要選
  const missing = [];
  p.unmappedProducts.forEach(raw => {
    const v = productPicks[raw];
    if (!v || v === '__PICK__') missing.push(`品名「${raw}」`);
  });
  p.unmappedColors.forEach(uc => {
    const k = `${uc.rawProduct}||${uc.rawColor}`;
    const v = colorPicks[k];
    if (!v || v === '__PICK__') missing.push(`「${uc.rawProduct} / ${uc.rawColor}」的顏色`);
  });
  if (missing.length) {
    alert('還有未選擇的項目：\n' + missing.slice(0, 10).join('\n') + (missing.length > 10 ? '\n…' : ''));
    return;
  }

  const newPairs = { ...(state.userMappings.pairs || {}) };
  const newProductMap = { ...(state.userMappings.products || {}) }; // 保留向後相容
  const skipRawProducts = new Set();
  const skipColorPairs = new Set();

  // 先處理品名 (允許單一品名 mapping，例如沒有顏色的情況)
  p.unmappedProducts.forEach(raw => {
    const v = productPicks[raw];
    if (v === '__SKIP__') { skipRawProducts.add(raw.toUpperCase()); return; }
    // 不再寫入單一 product map，等下用 pair 形式存
  });

  // 主要：依「品名+顏色」一對一對綁定存進 pairs
  p.unmappedColors.forEach(uc => {
    const pairKey = uc.rawProduct.toUpperCase() + '||' + uc.rawColor.toUpperCase();
    const productPick = productPicks[uc.rawProduct]; // 該 rawProduct 對應到的標準品名
    const colorPick = colorPicks[`${uc.rawProduct}||${uc.rawColor}`];
    if (productPick === '__SKIP__' || colorPick === '__SKIP__') {
      skipColorPairs.add(`${uc.rawProduct}||${uc.rawColor}`);
      return;
    }
    // 決定目標品名：使用者選的 / 新 SKU 保留原名 / 系統自動 normalize
    let targetProduct;
    if (productPick === '__NEW_SKU__') targetProduct = uc.rawProduct;
    else if (productPick) targetProduct = productPick;
    else targetProduct = normalizeProductName(uc.rawProduct, uc.rawColor); // 沒問就用自動 normalize
    // 決定目標顏色：使用者選的 / 新顏色 / 保留原色
    let targetColor;
    if (colorPick === '__NEW_COLOR__' || colorPick === '__KEEP__') targetColor = uc.rawColor;
    else if (colorPick) targetColor = colorPick;
    else targetColor = normalizeColorName(uc.rawColor, targetProduct);
    newPairs[pairKey] = { product: targetProduct, color: targetColor };
  });

  p.stagedRows.forEach(r => {
    const k = `${r.rawProduct}||${r.rawColor}`;
    if (skipRawProducts.has((r.rawProduct || '').toUpperCase()) || skipColorPairs.has(k)) {
      p.decisions.skip.add(r.rIdx);
    }
  });

  try {
    await setDoc(doc(db, ...ROOT, 'settings', 'userMappings'), {
      products: newProductMap,
      colors: state.userMappings.colors || {}, // 保留舊版顏色 map
      pairs: newPairs,                          // 新版品名+顏色綁定
      updatedAt: Date.now()
    }, { merge: true });
    state.userMappings = { products: newProductMap, colors: state.userMappings.colors || {}, pairs: newPairs };
    await writeStagedRows(p.stagedRows, p.filename);
    const writeCount = p.stagedRows.length - p.decisions.skip.size;
    alert(`✓ 完成！\n寫入 ${writeCount} 筆 (跳過 ${p.decisions.skip.size} 筆)\n新增 ${Object.keys(newPairs).length - Object.keys(state.userMappings.pairs || {}).length} 條品名+顏色 PAIR mapping`);
    state.pendingImport = null;
    closeModal();
    state.view = 'dashboard';
    render();
  } catch (e) {
    console.error(e);
    alert('儲存失敗：' + e.message);
  }
}

async function batchPdfDownload() {
  const grouped = displayedInvoices();
  const all = Object.values(grouped).flat();
  if (!all.length) { alert('目前篩選下沒有 SA 可以下載'); return; }
  if (!confirm(`準備下載 ${all.length} 張 PDF。\n(瀏覽器可能會詢問是否允許多檔下載，請按「允許」)`)) return;
  state.isDownloadingPdf = true;
  // 臨時把 PDF capture HTML build 出來 (這個動作很重，所以只在這裡跑，不放在 render())
  renderHiddenPdfCaptures();
  try {
    const html2pdf = await loadHtml2Pdf();
    for (const inv of all) {
      const el = document.getElementById(`invoice-capture-${inv.id}`);
      if (!el) continue;
      const filename = inv.origin === 'China' ? `${inv.cabinetNo}CN.pdf` : `${inv.cabinetNo}.pdf`;
      await html2pdf().set({
        margin: 0,
        filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(el).save();
      await new Promise(r => setTimeout(r, 700));
    }
  } catch (err) {
    console.error(err);
    alert('PDF 產生失敗：' + err.message);
  } finally {
    state.isDownloadingPdf = false;
  }
}

// ============================================================================
// === Tracking CSV Export ====================================================
// ============================================================================
function exportTrackingCsv() {
  const data = filteredMaster();
  const grouped = groupSAInvoices();
  const headers = ["Date","Client","C/NO","Origin","Product","Color","Order Qty","Shipped","Price","Note"];
  const lines = [headers.join(',')];
  data.forEach(d => {
    const cabin = d.cabinetNo || grouped[d.client]?.find(inv => inv.date === d.date && inv.origin === (d.origin || 'ER'))?.cabinetNo || '';
    const row = [d.date, d.client, cabin, d.origin || 'ER', `"${d.product||''}"`, d.color || '', d.orderQty || 0, `"${d.shippedDisplay || d.shippedQty || 0}"`, d.price || 0, `"${d.note||''}"`];
    lines.push(row.join(','));
  });
  const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Tracking_${state.filter.client === 'ALL' ? 'ALL' : state.filter.client}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ============================================================================
document.addEventListener('click', async (e) => {
  const t = e.target.closest('[data-action], [data-view]');
  if (!t) {
    // Click on modal overlay closes modal
    if (e.target.classList.contains('modal-overlay')) closeModal();
    return;
  }
  if (t.dataset.view) { state.view = t.dataset.view; state.inv = { product: null, color: null, scope: state.inv.scope }; render(); return; }
  const a = t.dataset.action;

  switch (a) {
    case 'drill': {
      state.inv.product = t.dataset.product || null;
      state.inv.color = t.dataset.color || null;
      render();
      break;
    }
    case 'set-scope': {
      state.inv.scope = t.dataset.scope;
      state.inv.product = null; state.inv.color = null;
      state.inv.stockFilter = null;
      state.view = 'inventory';
      render();
      break;
    }
    case 'set-stock-filter': {
      const f = t.dataset.filter;
      // 點同一個按鈕 → 取消篩選 (toggle)
      state.inv.stockFilter = (state.inv.stockFilter === f || f === 'all') ? null : f;
      state.inv.product = null; state.inv.color = null;
      render();
      break;
    }
    case 'open-sa': {
      state.activeClient = t.dataset.client;
      state.selectedInvId = t.dataset.inv;
      state.view = 'preview';
      render();
      break;
    }
    case 'print-all': {
      state.activeClient = t.dataset.client;
      state.view = 'printAll';
      render();
      break;
    }
    case 'goto-dashboard': {
      state.view = 'dashboard';
      render();
      break;
    }
    case 'window-print': window.print(); break;
    case 'edit-start': {
      const c = t.dataset.client;
      const cur = state.clientConfig[c]?.startNo || 1;
      const inp = prompt(`${c} 起始 C/NO 號碼：`, cur);
      if (inp != null && !isNaN(inp)) {
        const newCfg = { ...state.clientConfig, [c]: { ...(state.clientConfig[c] || { prefix: c }), startNo: parseInt(inp) } };
        await saveClientConfig(newCfg);
      }
      break;
    }
    case 'set-next-start': {
      const c = t.dataset.client;
      const cur = parseInt(t.dataset.current);
      const cnt = parseInt(t.dataset.count);
      const next = cur + cnt;
      if (confirm(`確認把 ${c} 的起始 C/NO 從 #${cur} 跳到 #${next}？\n\n本批：${cnt} 張`)) {
        const newCfg = { ...state.clientConfig, [c]: { ...(state.clientConfig[c] || { prefix: c }), startNo: next } };
        await saveClientConfig(newCfg);
      }
      break;
    }
    case 'add-manual-flow': {
      // 在 庫存 L3 新增一筆手動進貨/出貨列 (用於校正)
      const flow = t.dataset.flow; // 'in' or 'out'
      const product = t.dataset.product;
      const color = t.dataset.color;
      const isIn = flow === 'in';
      const date = prompt(`日期 (YYYY/M/D)：`, new Date().toISOString().slice(0,10).replace(/-/g,'/'));
      if (!date) break;
      const client = prompt(isIn ? '來源 (例：ER 或 ER(CSK))' : '客戶代號 (例：Ray)', isIn ? 'ER' : '');
      if (!client) break;
      const qtyStr = prompt(`${isIn ? '進貨' : '出貨'}碼數 (例：1013)`, '');
      const qty = parseFloat((qtyStr || '').replace(/[^\d.\-]/g, '')) || 0;
      if (!qty) { alert('碼數為零或無效，取消'); break; }
      const note = prompt('備註 (選填，例：3/9 ray 校正)', '');
      const parsed = parseClientCell(client);
      const id = `manual_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
      try {
        await setDoc(doc(db, ...ROOT, 'master_data', id), {
          date,
          client: parsed.client,
          stockTag: parsed.stockTag || null,
          kind: isIn ? (parsed.kind === 'warehouse-tagged' ? 'warehouse-tagged' : 'warehouse') : 'direct',
          flow: isIn ? 'in' : 'out',
          product,
          rawProduct: product,
          color,
          rawColor: color,
          shippedQty: qty,
          shippedDisplay: String(qty),
          price: 0,
          orderQty: 0,
          cabinetNo: '',
          orderNo: '',
          status: '',
          note: note || '手動新增',
          source: '__manual__',
          origin: 'ER',
          reviewed: true, // 手動新增 = 已審核
          isCorrection: true, // 標記為手動校正 — 會扣庫存但不出請款單
          timestamp: Date.now()
        });
        alert(`✓ 已新增 ${isIn ? '進貨' : '出貨'}校正：${date} · ${client} · ${product} / ${color} · ${qty}Y\n（會扣庫存，但不會出現在請款單）`);
      } catch (e) { alert('新增失敗：' + e.message); }
      break;
    }
    case 'start-edit': {
      const id = t.dataset.id;
      state.editingId = id;
      state.editValues = {};
      render();
      // Listen for inputs (input + change) — select 元素需要 change event 才會抓到
      setTimeout(() => {
        $$('.editing-row input, .editing-row select').forEach(inp => {
          const handler = (ev) => {
            if (!ev.target.dataset.field) return;
            state.editValues[ev.target.dataset.field] = ev.target.value;
          };
          inp.addEventListener('input', handler);
          inp.addEventListener('change', handler);
        });
      }, 0);
      break;
    }
    case 'save-edit': {
      const id = t.dataset.id;
      const upd = { ...state.editValues };
      if (upd.shippedDisplay !== undefined) {
        upd.shippedQty = sanitizeQuantity(upd.shippedDisplay);
      }
      if (upd.price !== undefined) upd.price = parseFloat(upd.price) || 0;
      await updateMasterRow(id, upd);
      state.editingId = null;
      state.editValues = {};
      break;
    }
    case 'cancel-edit': {
      state.editingId = null;
      state.editValues = {};
      render();
      break;
    }
    case 'delete-row': {
      const id = t.dataset.id;
      if (confirm('確認永久刪除這筆資料？')) await deleteMasterRow(id);
      break;
    }
    case 'export-csv': exportTrackingCsv(); break;
    case 'close-modal': closeModal(); break;
    case 'save-manual-revenue': {
      const d = {
        date: $('#mr-date').value,
        client: ($('#mr-client').value || '').toUpperCase().trim(),
        cabinetNo: $('#mr-cno').value || 'N/A',
        amount: parseFloat($('#mr-amount').value),
        source: $('#mr-source').value,
        note: $('#mr-note').value || ''
      };
      if (!d.date || !d.client || !d.amount) { alert('請填日期、客戶、金額'); break; }
      await addManualRevenue(d);
      break;
    }
    case 'delete-manual': {
      if (confirm('刪除這筆 manual revenue？')) await deleteManualRevenue(t.dataset.id);
      break;
    }
    case 'reset-config': {
      if (confirm('重置所有客戶 C/NO 起始號到系統預設值？')) await saveClientConfig({ ...DEFAULT_CLIENT_CONFIG });
      break;
    }
    case 'clear-all-mappings': {
      const total = Object.keys(state.userMappings?.products || {}).length + Object.keys(state.userMappings?.colors || {}).length + Object.keys(state.userMappings?.pairs || {}).length;
      if (!confirm(`確認清空全部 ${total} 條 mapping？此動作無法復原。\n\n清空後下次匯入 CSV 系統會跳模態框重新問你。`)) break;
      try {
        await setDoc(doc(db, ...ROOT, 'settings', 'userMappings'), {
          products: {}, colors: {}, pairs: {}, updatedAt: Date.now()
        }, { merge: false });
        state.userMappings = { products: {}, colors: {}, pairs: {} };
        alert(`✓ 已清空全部 ${total} 條 mapping`);
        render();
      } catch (e) { alert('清空失敗：' + e.message); }
      break;
    }
    case 'gs-save-urls': {
      const urls = collectGsUrlsFromDom();
      localStorage.setItem('everise_gsheet_urls', JSON.stringify(urls));
      $('#gs-status').textContent = `✓ 已儲存 ${urls.length} 份試算表`;
      break;
    }
    case 'gs-add-url': {
      const urls = collectGsUrlsFromDom();
      urls.push({ label: '', url: '' });
      localStorage.setItem('everise_gsheet_urls', JSON.stringify(urls));
      render();
      break;
    }
    case 'gs-remove-url': {
      const idx = parseInt(t.dataset.idx);
      const urls = collectGsUrlsFromDom();
      urls.splice(idx, 1);
      localStorage.setItem('everise_gsheet_urls', JSON.stringify(urls));
      render();
      break;
    }
    case 'gs-sync-one': {
      const idx = parseInt(t.dataset.idx);
      const urls = collectGsUrlsFromDom();
      const u = urls[idx];
      if (!u || !u.url) { alert('請先貼上 URL'); break; }
      localStorage.setItem('everise_gsheet_urls', JSON.stringify(urls));
      await syncOneGsUrl(u);
      break;
    }
    case 'gs-sync-all': {
      const urls = collectGsUrlsFromDom().filter(u => u.url);
      if (!urls.length) { alert('沒有設定任何 URL'); break; }
      localStorage.setItem('everise_gsheet_urls', JSON.stringify(collectGsUrlsFromDom()));
      $('#gs-status').textContent = `⏳ 同步 ${urls.length} 份試算表...`;
      let okCount = 0, errCount = 0;
      for (const u of urls) {
        try { await syncOneGsUrl(u, false); okCount++; }
        catch (e) { errCount++; console.error(e); }
      }
      $('#gs-status').textContent = `✓ 同步完成 ${okCount} 份，失敗 ${errCount} 份 · ${new Date().toLocaleTimeString()}`;
      break;
    }
    case 'ocr-import': {
      const text = ($('#ocr-text')?.value || '').trim();
      if (!text) { alert('沒有文字可以匯入'); break; }
      closeModal();
      const blob = new Blob([text], { type: 'text/csv' });
      const file = new File([blob], `ocr_import_${Date.now()}.csv`, { type: 'text/csv' });
      await handleCsvUpload({ target: { files: [file], value: '' } });
      break;
    }
    case 'rename-batch': {
      const src = t.dataset.source;
      const current = state.batchNames?.[src] || '';
      const newName = prompt(`改批次顯示名稱（例如「2026/5 第一批 5/1-5/10」）：\n原始檔名：${src}`, current);
      if (newName === null) break; // 取消
      const trimmed = newName.trim();
      try {
        const newBatchNames = { ...(state.batchNames || {}) };
        if (trimmed) newBatchNames[src] = trimmed;
        else delete newBatchNames[src]; // 空白 → 移除自訂名
        await setDoc(doc(db, ...ROOT, 'settings', 'batchNames'), newBatchNames, { merge: false });
        state.batchNames = newBatchNames;
        render();
      } catch (e) { alert('改名失敗：' + e.message); }
      break;
    }
    case 'delete-source': {
      const src = t.dataset.source;
      const targets = state.masterData.filter(d => (d.source || '(unknown)') === src);
      if (!confirm(`確認永久刪除「${src}」這個來源的全部 ${targets.length} 筆資料？\n\n此動作無法復原。`)) break;
      try {
        for (let i = 0; i < targets.length; i += 400) {
          const batch = writeBatch(db);
          targets.slice(i, i + 400).forEach(d => batch.delete(doc(db, ...ROOT, 'master_data', d.id)));
          await batch.commit();
        }
        alert(`✓ 已刪除 ${targets.length} 筆來自「${src}」的資料`);
      } catch (e) { alert('刪除失敗：' + e.message); }
      break;
    }
    case 'delete-pair-mapping': {
      const key = t.dataset.key;
      if (!confirm(`刪除 PAIR mapping「${key}」？\n下次匯入時這個 (客戶+品名+顏色) 組合會重新進待澄清。`)) break;
      const newPairs = { ...(state.userMappings?.pairs || {}) };
      delete newPairs[key];
      try {
        await setDoc(doc(db, ...ROOT, 'settings', 'userMappings'), { pairs: newPairs }, { merge: true });
        state.userMappings.pairs = newPairs;
        render();
      } catch (e) { alert('刪除失敗：' + e.message); }
      break;
    }
    case 'delete-mapping': {
      const type = t.dataset.type;
      const key = t.dataset.key;
      if (!confirm(`刪除 ${type} mapping「${key}」？\n下次匯入時這個拼法會再被當作未識別。`)) break;
      const newMappings = {
        products: { ...(state.userMappings.products || {}) },
        colors: { ...(state.userMappings.colors || {}) }
      };
      delete newMappings[type === 'product' ? 'products' : 'colors'][key];
      try {
        await setDoc(doc(db, ...ROOT, 'settings', 'userMappings'), newMappings, { merge: false });
        state.userMappings = newMappings;
        render();
      } catch (e) { alert('刪除失敗：' + e.message); }
      break;
    }
    case 'confirm-mapping': {
      await applyMappingsAndImport();
      break;
    }
    case 'cancel-mapping': {
      if (state.pendingImport && (state.pendingImport.unmappedProducts.length || state.pendingImport.unmappedColors.length)) {
        if (!confirm(`取消會放棄這次匯入的 ${state.pendingImport.stagedRows.length} 筆資料。確定？`)) break;
      }
      state.pendingImport = null;
      closeModal();
      break;
    }
    case 'export-needs-review': {
      // 收集所有 unmapped 列，輸出成 CSV 給泰國
      const lines = ['CSV 品名,CSV 顏色,筆數,總碼數,客戶,來源檔,範例日期'];
      const grouped = {};
      state.masterData.forEach(d => {
        const rawP = d.rawProduct || d.product || '';
        const rawC = d.rawColor || d.color || '';
        const normP = normalizeProductName(rawP).toUpperCase();
        const normC = normalizeColorName(rawC, rawP).toUpperCase();
        const ok = MASTER_INVENTORY.some(s => s.itemName.toUpperCase() === normP && s.color.toUpperCase() === normC);
        if (!ok) {
          const k = `${d.rawProduct || d.product || ''}||${d.rawColor || d.color || ''}`;
          if (!grouped[k]) grouped[k] = { rawProduct: d.rawProduct || d.product, rawColor: d.rawColor || d.color, count:0, totalQty:0, clients: new Set(), sources: new Set(), dates: new Set() };
          const g = grouped[k];
          g.count++;
          g.totalQty += (d.shippedQty || 0);
          if (d.client) g.clients.add(d.client);
          if (d.source) g.sources.add(d.source);
          if (d.date) g.dates.add(d.date);
        }
      });
      Object.values(grouped).sort((a,b) => b.count - a.count).forEach(g => {
        lines.push([`"${g.rawProduct||''}"`, `"${g.rawColor||''}"`, g.count, g.totalQty, `"${[...g.clients].join(';')}"`, `"${[...g.sources].slice(0,3).join(';')}"`, `"${[...g.dates].sort()[0] || ''}"`].join(','));
      });
      const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `待澄清清單_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      break;
    }
    case 'approve-row': {
      await approveRow(t.dataset.id);
      break;
    }
    case 'approve-batch-by-raw': {
      await approveBatchByRaw(t.dataset.id);
      break;
    }
    case 'skip-row': {
      await skipRow(t.dataset.id);
      break;
    }
    case 'gs-save-cutoff': {
      const input = $('#gs-cutoff-date');
      const val = (input?.value || '').trim();
      if (!val) { alert('請先選日期'); break; }
      // 轉成 YYYY/M/D 統一格式存
      const [y, m, d] = val.split('-');
      const norm = `${y}/${parseInt(m)}/${parseInt(d)}`;
      localStorage.setItem('everise_csv_import_after', norm);
      alert(`✓ 已設定：只匯入 ${norm} 之後的列\n下次同步/匯入就會自動過濾`);
      render();
      break;
    }
    case 'gs-clear-cutoff': {
      localStorage.removeItem('everise_csv_import_after');
      alert('✓ 已清除日期過濾，下次同步會匯入全部資料');
      render();
      break;
    }
    case 'bulk-delete-before-date': {
      // 批次刪除某日期之前的所有未審核列 — 用於清理舊資料 (例如自動同步把 1-4 月也拉了進來)
      const cutoff = prompt('刪除這個日期之前的所有未審核列\n(格式 YYYY/M/D 或 YYYY-MM-DD)\n例如：2026/4/30 → 刪除 5/1 之前的所有未審', '2026/4/30');
      if (!cutoff) break;
      const cutoffSortable = dateToSortable(cutoff);
      if (!cutoffSortable) { alert('日期格式錯誤'); break; }
      const targets = state.masterData.filter(d => {
        if (isReviewed(d)) return false; // 只刪未審
        if (!d.date) return false;
        return dateToSortable(d.date) <= cutoffSortable;
      });
      if (!targets.length) { alert(`沒有「${cutoff} 及之前」的未審核列`); break; }
      if (!confirm(`確認刪除 ${targets.length} 筆 ${cutoff} 及之前的未審核列？\n這個動作會永久刪除 Firestore 的資料，無法復原。\n\n(這些列不會影響庫存/請款單，因為它們都是未審狀態)`)) break;
      try {
        // Firestore 一次最多 500 操作，分批
        for (let i = 0; i < targets.length; i += 400) {
          const batch = writeBatch(db);
          targets.slice(i, i + 400).forEach(d => batch.delete(doc(db, ...ROOT, 'master_data', d.id)));
          await batch.commit();
        }
        // 樂觀更新 local state
        const targetIds = new Set(targets.map(d => d.id));
        state.masterData = state.masterData.filter(d => !targetIds.has(d.id));
        bumpMasterDataVersion();
        alert(`✓ 已刪除 ${targets.length} 筆 ${cutoff} 及之前的未審核列`);
        render();
      } catch (e) { alert('刪除失敗：' + e.message); }
      break;
    }
    case 'auto-approve-direct': {
      // 批次處理所有「直送」未審核列：
      // 1) 設 reviewed = true
      // 2) 把 product/color 回復成 raw (因為之前可能被亂 normalize)
      const direct = state.masterData.filter(d => {
        const k = d.kind || parseClientCell(d.client).kind;
        return k === 'direct' && !isReviewed(d);
      });
      if (!direct.length) { alert('沒有待審核的直送列'); break; }
      if (!confirm(`一鍵審核 ${direct.length} 筆直送列？\n會：\n• 標記已審核\n• 把品名/顏色回復成 CSV 原始值 (避免之前被亂分類)\n直送只進請款單，不影響 ER 庫存。`)) break;
      try {
        for (let i = 0; i < direct.length; i += 400) {
          const batch = writeBatch(db);
          direct.slice(i, i + 400).forEach(d => {
            const update = { reviewed: true };
            // 把 product/color 回到 raw (避免之前 normalize 把 600D PVC 變 600*600D CSK 等亂分類)
            if (d.rawProduct && d.product !== d.rawProduct) update.product = d.rawProduct;
            if (d.rawColor && d.color !== d.rawColor) update.color = d.rawColor;
            batch.update(doc(db, ...ROOT, 'master_data', d.id), update);
          });
          await batch.commit();
        }
        alert(`✓ 已自動審核並回復 ${direct.length} 筆直送列為原始名稱`);
      } catch (e) { alert('失敗：' + e.message); }
      break;
    }
    case 'unreview-row': {
      // 把單列退回未審核狀態 (退回 待澄清 頁)
      const id = t.dataset.id;
      if (!confirm('把這筆退回「未審核」？\n會從庫存/請款單裡移除，回到待澄清頁。')) break;
      try {
        await updateDoc(doc(db, ...ROOT, 'master_data', id), { reviewed: false });
      } catch (e) { alert('失敗：' + e.message); }
      break;
    }
    case 'boss-set-filter': {
      const f = t.dataset.filter;
      if (f === 'all') state.bossFilter = null;
      else state.bossFilter = (state.bossFilter === f) ? null : f;
      render();
      break;
    }
    case 'boss-export-csv': {
      const focus = state.bossFocus || 'C4';
      const isAll = focus === '__ALL__';
      const eff = getEffectiveInventory();
      const focusSkus = isAll ? eff : eff.filter(s => s.itemName === focus);
      const today = new Date().toISOString().split('T')[0];
      const lines = isAll
        ? ['#,品相,顏色,補貨標準,2025出貨,2026出貨,2026庫存,庫存-補貨標準,需補貨']
        : ['#,顏色,補貨標準,2025出貨,2026出貨,2026庫存,庫存-補貨標準,需補貨'];
      focusSkus.forEach((sku, idx) => {
        const ships = getShipmentsFor(sku.itemName, sku.color);
        const out26 = Math.max(ships.filter(s => (s.date||'').startsWith('2026')).reduce((a,b)=>a+(b.shippedQty||0),0), sku.out2026 || 0);
        const cur = (sku.init2026 || 0) - out26;
        const safety = sku.safetyLevel || 0;
        const std = sku.recommendedRestock || safety;
        const deficit = cur - safety;
        const row = isAll
          ? [idx+1, `"${sku.itemName}"`, `"${sku.color}"`, std, sku.out2025 || 0, out26, cur, deficit, deficit < 0 ? 'YES' : 'NO']
          : [idx+1, `"${sku.color}"`, std, sku.out2025 || 0, out26, cur, deficit, deficit < 0 ? 'YES' : 'NO'];
        lines.push(row.join(','));
      });
      const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `回報老闆_${isAll ? '全部品相' : focus}_${today}.csv`;
      a.click();
      break;
    }
  }
});

// 老闆報表 + 排序下拉的切換
document.addEventListener('change', (e) => {
  if (e.target.id === 'boss-focus') {
    state.bossFocus = e.target.value;
    render();
  }
  if (e.target.id === 'sort-picker') {
    state.sortMode = e.target.value;
    render();
  }
  if (e.target.id === 'gs-auto-toggle') {
    localStorage.setItem('everise_gsheet_auto', e.target.checked ? '1' : '0');
    setupAutoGsSync();
  }
  if (e.target.id === 'ocr-image-input') {
    handleOcrImages(e);
  }
  // 出貨追蹤 / 庫存 L3 inline edit：選了品名 → 重建同列的顏色下拉
  if (e.target.classList && e.target.classList.contains('inline-edit-product-sel')) {
    const tr = e.target.closest('tr');
    const colorSel = tr?.querySelector('.inline-edit-color-sel');
    if (colorSel) {
      const pickedProduct = e.target.value;
      const colors = [...new Set(getEffectiveInventory().filter(s => s.itemName === pickedProduct).map(s => s.color))].sort();
      const currentColorVal = colorSel.value;
      colorSel.innerHTML = colors.map(c => `<option value="${escAttr(c)}" ${c === currentColorVal ? 'selected' : ''}>${escHtml(c)}</option>`).join('');
      if (![...colorSel.options].some(o => o.value === currentColorVal) && colorSel.options.length > 0) {
        colorSel.value = colorSel.options[0].value;
      }
    }
  }
  // 待澄清頁：選了品名 → 重建同一列的顏色下拉，列出該品名的所有可用顏色
  if (e.target.classList && e.target.classList.contains('review-product-pick') && e.target.value !== '__CUSTOM__' && e.target.value !== '__KEEP__') {
    const tr = e.target.closest('tr');
    const colorSel = tr?.querySelector('.review-color-pick');
    if (colorSel) {
      const pickedProduct = e.target.value;
      // 從 effective inventory 找該品相的所有顏色 (含 MASTER + user-added)
      const colors = [...new Set(getEffectiveInventory().filter(s => s.itemName === pickedProduct).map(s => s.color))].sort();
      const currentColorVal = colorSel.value;
      const rawColorText = colorSel.querySelector('option[value="__KEEP__"]')?.textContent?.match(/\(([^)]+)\)/)?.[1] || '空';
      colorSel.innerHTML = `
        <option value="__KEEP__" style="color:var(--text-2);">✓ 保留原色 (${escHtml(rawColorText)})</option>
        <option value="__CUSTOM__" style="color:var(--info-text); font-weight:600;">✏️ 自訂新顏色...</option>
        ${colors.length ? `<option disabled>── ${escHtml(pickedProduct)} 內既有顏色 ──</option>` : '<option disabled>(該品相無既有顏色)</option>'}
        ${colors.map(c => `<option value="${escAttr(c)}">${escHtml(c)}</option>`).join('')}
      `;
      // 還原使用者已選的值（若還在候選中）；否則預設保留原色
      const stillValid = [...colorSel.options].some(o => o.value === currentColorVal);
      colorSel.value = stillValid ? currentColorVal : '__KEEP__';
    }
  }
  // 待澄清頁：選到 ✏️ 自訂 → prompt 使用者輸入自訂品名/顏色
  if (e.target.classList && e.target.classList.contains('review-product-pick') && e.target.value === '__CUSTOM__') {
    const custom = prompt('輸入自訂品相名稱（例：Sandwich Mesh 250G (OC)）：');
    if (!custom || !custom.trim()) {
      e.target.value = '__KEEP__'; // 取消 → 復原
      return;
    }
    const customTrim = custom.trim();
    // 動態加一個 option 並選中
    const opt = document.createElement('option');
    opt.value = customTrim;
    opt.textContent = `✨ ${customTrim} (自訂)`;
    opt.selected = true;
    e.target.insertBefore(opt, e.target.children[2]); // 放在 __CUSTOM__ 跟 disabled 之間
    e.target.value = customTrim;
  }
  if (e.target.classList && e.target.classList.contains('review-color-pick') && e.target.value === '__CUSTOM__') {
    const custom = prompt('輸入自訂顏色名稱：');
    if (!custom || !custom.trim()) {
      e.target.value = '__KEEP__';
      return;
    }
    const customTrim = custom.trim();
    const opt = document.createElement('option');
    opt.value = customTrim;
    opt.textContent = `✨ ${customTrim} (自訂)`;
    opt.selected = true;
    e.target.insertBefore(opt, e.target.children[2]);
    e.target.value = customTrim;
  }
});

// ============================================================================
// === 圖檔 OCR (Tesseract.js) =================================================
// ============================================================================
const loadTesseract = () => new Promise((resolve, reject) => {
  if (window.Tesseract) return resolve(window.Tesseract);
  const s = document.createElement('script');
  s.src = "https://unpkg.com/tesseract.js@5/dist/tesseract.min.js";
  s.onload = () => resolve(window.Tesseract);
  s.onerror = () => reject(new Error('Tesseract 載入失敗'));
  document.body.appendChild(s);
});

async function handleOcrImages(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  const statusEl = $('#ocr-status');
  if (statusEl) statusEl.textContent = '⏳ 載入 OCR 引擎...';
  try {
    const Tesseract = await loadTesseract();
    let allText = '';
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      if (statusEl) statusEl.textContent = `⏳ 辨識中 ${i+1}/${files.length}: ${f.name}`;
      const result = await Tesseract.recognize(f, 'eng+chi_tra', {
        logger: m => { if (statusEl && m.progress) statusEl.textContent = `⏳ ${f.name} - ${Math.round(m.progress*100)}%`; }
      });
      allText += `\n\n=== ${f.name} ===\n` + (result.data.text || '');
    }
    // 跳出文字編輯 modal 給使用者校正
    $('#modal-host').innerHTML = `
      <div class="modal-overlay" data-modal="ocr">
        <div class="modal" style="max-width: 800px;">
          <div class="modal-hdr">
            <h3>📷 OCR 辨識結果 — 請校正後再匯入</h3>
            <button class="btn-ghost btn-icon" data-action="close-modal">✕</button>
          </div>
          <div class="modal-body">
            <p style="font-size:12px; color:var(--text-3); margin-bottom:10px; line-height:1.6;">
              辨識可能不準確（特別是手寫單），請對照原圖手動校正。<br>
              校正後要符合 CSV 格式：<code class="mono">Ship Date,Client,Product Name,Color,Quantity,Unit Price,total</code> (用逗號分隔)
            </p>
            <textarea id="ocr-text" style="width:100%; min-height:400px; font-family: monospace; font-size:11px; padding:10px; border:1px solid var(--line-strong); border-radius:7px;">${escHtml(allText.trim())}</textarea>
          </div>
          <div class="modal-foot">
            <button class="btn btn-secondary" data-action="close-modal">取消</button>
            <button class="btn btn-primary" data-action="ocr-import">✓ 把這份文字當 CSV 匯入</button>
          </div>
        </div>
      </div>`;
    if (statusEl) statusEl.textContent = `✓ 辨識完成 ${files.length} 張`;
  } catch (err) {
    if (statusEl) statusEl.textContent = '✗ 失敗：' + err.message;
    alert('OCR 失敗：' + err.message);
  }
  e.target.value = '';
}

// 收集 settings 頁所有 URL 輸入框
function collectGsUrlsFromDom() {
  const labels = [...document.querySelectorAll('.gs-label-input')].sort((a,b) => parseInt(a.dataset.idx) - parseInt(b.dataset.idx));
  const urls = [...document.querySelectorAll('.gs-url-input')].sort((a,b) => parseInt(a.dataset.idx) - parseInt(b.dataset.idx));
  const result = [];
  for (let i = 0; i < urls.length; i++) {
    result.push({ label: (labels[i]?.value || '').trim(), url: (urls[i]?.value || '').trim() });
  }
  return result;
}

// 同步單一份試算表
async function syncOneGsUrl(u, updateStatus = true) {
  if (updateStatus) $('#gs-status').textContent = `⏳ 同步「${u.label || u.url.slice(0,30)}」中...`;
  const res = await fetch(u.url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const blob = new Blob([text], { type: 'text/csv' });
  const fname = (u.label ? u.label + '_' : '') + 'gsheet_' + new Date().toISOString().split('T')[0] + '.csv';
  const file = new File([blob], fname, { type: 'text/csv' });
  await handleCsvUpload({ target: { files: [file], value: '' } });
  if (updateStatus) $('#gs-status').textContent = `✓ 同步「${u.label || '單一份'}」完成 · ${new Date().toLocaleTimeString()}`;
}

// 自動同步定時器 — 支援多份 URL，5 天一次
// 修法：每次開啟頁面就檢查上次同步距今多久，若 ≥ 5 天 → 立即跑一次。
// 這樣即使瀏覽器之前關著好幾天，重開後也會補一次。
const GS_INTERVAL_MS = 5 * 24 * 60 * 60 * 1000; // 5 天
let _gsSyncTimer = null;
async function runAutoSync(urls) {
  console.log(`[GS auto-sync] 開始同步 ${urls.length} 份試算表`);
  for (const u of urls) {
    try { await syncOneGsUrl(u, false); console.log(`[GS] ✓ ${u.label || u.url.slice(0,40)}`); }
    catch (e) { console.warn('[GS auto-sync] 失敗', u.label || u.url, e); }
  }
  localStorage.setItem('everise_gsheet_last_sync', String(Date.now()));
}
function setupAutoGsSync() {
  if (_gsSyncTimer) { clearInterval(_gsSyncTimer); _gsSyncTimer = null; }
  const auto = localStorage.getItem('everise_gsheet_auto') === '1';
  let urls = [];
  try { urls = JSON.parse(localStorage.getItem('everise_gsheet_urls') || '[]').filter(u => u.url); } catch(e) {}
  if (!auto || !urls.length) return;
  // 1. 立即檢查：上次同步距今超過 5 天就馬上補一次
  const lastSync = parseInt(localStorage.getItem('everise_gsheet_last_sync') || '0');
  if (Date.now() - lastSync >= GS_INTERVAL_MS) {
    setTimeout(() => runAutoSync(urls), 5000); // 延後 5 秒讓頁面先載完 Firebase 等
  }
  // 2. 持續定時 (若瀏覽器一直開著)
  _gsSyncTimer = setInterval(() => runAutoSync(urls), GS_INTERVAL_MS);
  console.log(`[GS] auto sync enabled — ${urls.length} URLs, 5-day interval (上次同步: ${lastSync ? new Date(lastSync).toLocaleString() : '從未'})`);
}
setupAutoGsSync();

// ============================================================================
// === Firebase Auth + Realtime Sync ==========================================
// ============================================================================
signInAnonymously(auth).catch(err => { console.warn('Auth error:', err); state.syncStatus = 'error'; updateSyncDot(); });
onAuthStateChanged(auth, (u) => {
  state.user = u;
  if (!u) return;
  state.syncStatus = 'syncing';
  updateSyncDot();

  onSnapshot(collection(db, ...ROOT, 'master_data'), (snap) => {
    state.masterData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    state.syncStatus = 'live';
    clearERCabinCache();
    bumpMasterDataVersion(); // 讓 memoize 失效，重新算
    render();
  }, (err) => {
    console.warn('Firestore master_data read blocked:', err);
    state.syncStatus = 'error';
    render();
  });

  onSnapshot(doc(db, ...ROOT, 'settings', 'config'), (snap) => {
    if (snap.exists() && snap.data().clientConfig) {
      const fromFirestore = snap.data().clientConfig;
      // 深合併：每個客戶 config 都用 DEFAULT 作底，再用 Firestore 覆蓋
      // 確保新加的欄位（如 ER.manualCabins）不會被舊 Firestore 資料抹掉
      const merged = { ...DEFAULT_CLIENT_CONFIG };
      Object.keys(fromFirestore).forEach(k => {
        merged[k] = { ...(DEFAULT_CLIENT_CONFIG[k] || {}), ...(fromFirestore[k] || {}) };
        // manualCabins 用合併而非取代：寫死的優先級高
        if (DEFAULT_CLIENT_CONFIG[k]?.manualCabins) {
          merged[k].manualCabins = {
            ...(DEFAULT_CLIENT_CONFIG[k].manualCabins || {}),
            ...(fromFirestore[k]?.manualCabins || {})
          };
        }
      });
      state.clientConfig = merged;
      _erCabinMap = null; // 清 cache 強制重建
      render();
    }
  });

  onSnapshot(collection(db, ...ROOT, 'manual_revenue'), (snap) => {
    state.manualRevenueData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  // 使用者手動建立的 product/color/pair mappings
  onSnapshot(doc(db, ...ROOT, 'settings', 'userMappings'), (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      state.userMappings = {
        products: data.products || {},
        colors: data.colors || {},
        pairs: data.pairs || {}
      };
      render();
    }
  });
  // 批次顯示名 (使用者在 資料管理 改的)
  onSnapshot(doc(db, ...ROOT, 'settings', 'batchNames'), (snap) => {
    if (snap.exists()) {
      state.batchNames = snap.data() || {};
      render();
    }
  });
});

// Initial render
render();
